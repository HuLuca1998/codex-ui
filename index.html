<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Session Viewer — Codex & Claude</title>
<script src="/tailwind.js"></script>
<script>
tailwind.config={theme:{extend:{
  fontFamily:{
    sans:['-apple-system','BlinkMacSystemFont','SF Pro Text','Segoe UI','PingFang SC','sans-serif'],
    mono:['ui-monospace','SF Mono','SFMono-Regular','Menlo','monospace'],
  },
  colors:{accent:'#9aa0e8',teal:'#84cabb',sage:'#7fc99a',sand:'#d6b878',mauve:'#b89ad6',rose:'#d98a8f'},
}}}
</script>
<style type="text/tailwindcss">
@layer base{
  body{ @apply font-sans antialiased text-[#e6e6e8]; }
}
@layer components{
  /* 侧栏会话项 */
  .item{ @apply flex flex-col gap-1.5 mx-2 px-3 py-2.5 rounded-[16px] cursor-pointer
          transition-all duration-200 hover:bg-white/[0.035]; }
  .item.sel{ @apply bg-white/[0.06]; }
  .item .ttl{ @apply text-[13px] font-medium text-[#bdbdc4] truncate flex-1 min-w-0; }
  .item.sel .ttl{ @apply text-[#f0f0f3]; }
  .item .prev{ @apply text-[12px] leading-snug text-[#74747e] line-clamp-1; }
  .item .metaline{ @apply text-[10.5px] text-[#54545d] tabular-nums
                    flex items-center gap-1.5 whitespace-nowrap overflow-hidden; }
  .item .mtime{ @apply flex-none whitespace-nowrap; }
  .item .sid{ @apply font-mono text-[#4a4a52] ml-auto flex-none max-w-[116px] truncate; }
  .item .pin{ @apply text-[10px] text-sand flex-none; }
  /* 折叠箭头：父项右上角，独立 hit-area，与点击进入会话区分 */
  .item .chev{ @apply flex-none w-[18px] h-[18px] grid place-items-center rounded-[6px]
                text-[10px] text-[#62626b] hover:bg-white/[0.07] hover:text-[#bdbdc4]
                transition cursor-pointer select-none; }
  .item .chev .ic{ @apply transition-transform duration-150; }
  .item.exp .chev .ic{ transform: rotate(90deg); }
  /* 子代理计数徽章：紧靠 chev，单击切折叠 */
  .item .subcnt{ @apply flex-none text-[10px] tracking-wide text-[#74747e]
                  px-1.5 py-[1px] rounded-[5px] bg-white/[0.04]
                  hover:bg-white/[0.08] cursor-pointer select-none; }
  /* 子代理行：缩进 + 左侧 spine + 头部横向连接线 */
  .item.sub{ @apply ml-5 pl-3.5 py-1.5 gap-1 rounded-[12px]; position: relative; }
  .item.sub::before{ content:""; position:absolute; left:0; top:-6px; bottom:6px;
                     width:1px; background:rgba(255,255,255,0.07); }
  .item.sub.last::before{ bottom: calc(100% - 16px); }
  .item.sub::after{ content:""; position:absolute; left:0; top:16px; width:10px;
                    height:1px; background:rgba(255,255,255,0.07); }
  .item.sub .ttl{ @apply text-[12.5px] text-[#a8a8b0]; }
  .item.sub .prev{ @apply text-[11.5px]; }

  /* 右键菜单 */
  .ctxmenu{ @apply fixed z-[60] min-w-[150px] py-1 rounded-[10px] bg-[#1c1c1e]
            ring-1 ring-white/[0.09] shadow-[0_18px_44px_-10px_rgba(0,0,0,.75)]; }
  .ctxmenu .mi{ @apply px-3.5 py-[7px] text-[12.5px] text-[#d4d4da] cursor-pointer
                select-none flex items-center gap-2 hover:bg-white/[0.07]; }

  .dot{ @apply w-[6px] h-[6px] rounded-full flex-none; }
  .dot.live{ @apply bg-sage; animation:breathe 2.4s ease-in-out infinite; }
  .dot.idle{ @apply bg-[#3a3a42]; }

  .badge{ @apply text-[9px] font-semibold tracking-wide uppercase px-1.5 py-[1px] rounded-[4px]
           bg-accent/[0.14] text-accent; }

  /* 顶栏元信息 */
  .pill{ @apply flex items-center gap-1.5 text-[11.5px] text-[#8a8a93] px-2.5 py-1
          rounded-full bg-white/[0.04]; }

  /* 设置面板 */
  .setrow{ @apply flex flex-col gap-2.5 p-4 rounded-[16px]
            bg-white/[0.025] ring-1 ring-white/[0.05]; }
  .setlbl{ @apply text-[11px] font-medium text-[#74747e] w-[30px] flex-none; }
  .setin{ @apply flex-1 min-w-0 bg-white/[0.04] ring-1 ring-white/[0.06]
           focus:ring-accent/40 rounded-[10px] px-3 py-1.5 text-[12.5px]
           text-[#d4d4da] placeholder:text-[#54545d] outline-none transition; }
  .setdel{ @apply flex-none w-[26px] h-[26px] rounded-[8px] text-[#74747e]
            hover:bg-rose/[0.16] hover:text-rose text-[11px] transition; }
  .snav{ @apply text-[12.5px] text-[#9a9aa3] px-3 py-2 rounded-[10px]
          transition cursor-pointer select-none hover:bg-white/[0.04]; }
  .snav.active{ @apply bg-accent/[0.16] text-accent font-medium; }
  .sfield{ @apply flex items-start gap-4 py-3.5 border-b border-white/[0.04]; }
  .sflabel{ @apply w-[150px] flex-none text-[12.5px] text-[#c8c8cf] pt-[7px]; }
  .sfctl{ @apply flex-1 min-w-0 flex flex-col gap-1.5 items-start; }
  .sfdesc{ @apply text-[11px] text-[#62626b] leading-relaxed; }
  .sw{ @apply relative w-[38px] h-[22px] rounded-full bg-white/[0.12]
        transition cursor-pointer flex-none; }
  .sw.on{ @apply bg-accent; }
  .swknob{ @apply absolute top-[3px] left-[3px] w-[16px] h-[16px] rounded-full
            bg-white transition-all duration-200; }
  .sw.on .swknob{ @apply left-[19px]; }
  .sgrouptitle{ @apply text-[11px] font-semibold uppercase tracking-wider
                 text-[#54545d] mt-7 mb-2; }
  .sbtn{ @apply text-[12px] font-medium text-[#bdbdc4] bg-white/[0.05]
          hover:bg-white/[0.09] rounded-[10px] px-3.5 py-2 transition; }
  .sbtn.accent{ @apply text-accent bg-accent/[0.12] hover:bg-accent/[0.22]; }
  .spre{ @apply bg-black/40 rounded-[10px] px-3.5 py-3 font-mono text-[11.5px]
          leading-relaxed text-[#a8acb8] whitespace-pre-wrap break-words
          max-h-[260px] overflow-auto; }
  .schk{ @apply flex items-center gap-2 text-[12px] text-[#bdbdc4]
          py-[3px] cursor-pointer; }

  /* 时间线事件 */
  .ev{ @apply mb-7; animation:rise .3s cubic-bezier(.2,.7,.2,1) both; }
  .ev.glow{ animation:rise .5s cubic-bezier(.2,.7,.2,1) both; }

  /* 消息 */
  .msg{ @apply flex gap-3.5; }
  .msg .av{ @apply w-7 h-7 rounded-[9px] flex-none flex items-center justify-center
             text-[12px] font-semibold mt-[2px]; }
  .msg.user .av{ @apply bg-[#243f3a] text-teal; }
  .msg.asst .av{ @apply bg-[#2f3048] text-accent; }
  .msg .body{ @apply flex-1 min-w-0; }
  .msg .name{ @apply flex items-center gap-2 text-[12px] font-medium text-[#7c7c86] mb-1.5; }
  .msg .time{ @apply text-[10.5px] text-[#4f4f58] font-normal; }
  .bubble{ @apply text-[13.5px] leading-relaxed text-[#dcdce0] break-words; }
  .msg.user .bubble{ @apply bg-white/[0.04] rounded-[18px] rounded-tl-[6px] px-4 py-3; }

  /* 卡片 */
  .card{ @apply rounded-[16px] bg-white/[0.022] ring-1 ring-white/[0.045]
          overflow-hidden transition-all duration-200; }
  .card:hover{ @apply ring-white/[0.07]; }
  .card .ch{ @apply flex items-center gap-2.5 px-3.5 py-2.5 cursor-pointer
              transition-colors duration-150 hover:bg-white/[0.022] select-none; }
  .card .ch .ic{ @apply w-[22px] h-[22px] rounded-[7px] flex-none flex items-center
                  justify-center text-[12px]; }
  .card .ch .lbl{ @apply text-[12.5px] font-medium text-[#c8c8cf] flex-none; }
  .card .ch .sub{ @apply text-[11.5px] text-[#62626b] font-mono truncate flex-1 min-w-0; }
  .card .ch .caret{ @apply text-[9px] text-[#54545d] flex-none transition-transform duration-200; }
  .card.open .ch .caret{ @apply rotate-90; }
  .card .cbody{ @apply hidden border-t border-white/[0.04]; }
  .card.open .cbody{ @apply block; }
  .stat{ @apply text-[9.5px] font-semibold uppercase tracking-wide px-2 py-[2px] rounded-[5px] flex-none; }
  .stat.ok{ @apply bg-sage/[0.14] text-sage; }
  .stat.err{ @apply bg-rose/[0.16] text-rose; }
  .stat.run{ @apply bg-sand/[0.16] text-sand; }

  .ic.tool{ @apply bg-accent/[0.13] text-accent; }
  .ic.exec{ @apply bg-sage/[0.13] text-sage; }
  .ic.patch{ @apply bg-mauve/[0.14] text-mauve; }
  .ic.think{ @apply bg-sand/[0.13] text-sand; }
  .ic.sys{ @apply bg-white/[0.05] text-[#8a8a93]; }
  .ic.search{ @apply bg-teal/[0.13] text-teal; }

  .term{ @apply bg-black/40 px-3.5 py-3 font-mono text-[12px] leading-relaxed
          whitespace-pre-wrap break-words; }
  .term .cmd{ @apply text-teal; }
  .term .out{ @apply block text-[#a8acb8] mt-1.5 max-h-[340px] overflow-y-auto; }
  .term .meta{ @apply block text-[#54545d] mt-1.5 text-[11px]; }
  .argblk{ @apply bg-black/40 px-3.5 py-3 font-mono text-[12px] text-[#c0c4d0]
            whitespace-pre-wrap break-words max-h-[360px] overflow-auto; }

  .think-body{ @apply px-3.5 py-3 text-[12.5px] leading-relaxed text-[#9a9aa3]; }
  .sys-body{ @apply px-3.5 py-3 font-mono text-[11.5px] leading-relaxed text-[#8a8a93]
              whitespace-pre-wrap break-words max-h-[320px] overflow-auto; }

  /* AskUserQuestion 询问气泡 */
  .ask{ @apply mt-1 space-y-2.5; }
  .ask-q{ @apply bg-white/[0.025] ring-1 ring-white/[0.045] rounded-[14px] px-3.5 py-3; }
  .ask-h{ @apply inline-block text-[10px] uppercase tracking-wide font-semibold
           text-accent bg-accent/[0.13] rounded-[5px] px-2 py-[2px] mb-2; }
  .ask-t{ @apply text-[13.5px] leading-relaxed text-[#dcdce0] mb-2.5; }
  .ask-opts{ @apply grid gap-1.5; }
  .ask-op{ @apply text-left bg-white/[0.025] ring-1 ring-white/[0.06] rounded-[10px]
           px-3 py-2 cursor-pointer transition-colors hover:ring-accent/40
           hover:bg-white/[0.04]
           disabled:cursor-default disabled:hover:ring-white/[0.06]
           disabled:hover:bg-white/[0.025]; }
  .ask-op.sel{ @apply ring-accent bg-accent/[0.13]; }
  .ask-op-l{ @apply text-[13px] font-medium text-[#e0e0e6]; }
  .ask-op-d{ @apply text-[11.5px] text-[#7c7c86] mt-0.5 leading-snug; }
  .ask-other{ @apply w-full bg-black/30 ring-1 ring-white/[0.05] rounded-[10px]
              px-3 py-2 text-[12.5px] text-[#dcdce0] resize-none focus:outline-none
              focus:ring-accent/40 placeholder:text-[#54545d]; }
  .ask-sub{ @apply text-[12px] font-medium px-3.5 py-2 rounded-[10px] self-start
            bg-accent/[0.18] text-accent ring-1 ring-accent/30 transition-colors
            hover:bg-accent/[0.28] disabled:opacity-40 disabled:cursor-default
            disabled:hover:bg-accent/[0.18]; }
  .ask.done .ask-op{ @apply opacity-60; }
  .ask.done .ask-op.sel{ @apply opacity-100 ring-sage bg-sage/[0.16]; }
  .ask-hint{ @apply text-[12px] leading-relaxed text-sand bg-sand/[0.10]
             ring-1 ring-sand/30 rounded-[10px] px-3 py-2; }

  .raw-btn{ @apply text-[10px] font-mono text-[#54545d] px-2 py-[2px] rounded-[5px]
             ring-1 ring-white/[0.05] flex-none transition-colors hover:text-accent; }
  .raw{ @apply hidden mt-2 bg-black/50 rounded-[10px] px-3 py-2.5 font-mono text-[11px]
         text-[#9498a6] whitespace-pre-wrap break-words max-h-[300px] overflow-auto; }
  .raw.show{ @apply block; }

  /* diff */
  .diff{ @apply font-mono text-[12px] leading-[1.55] overflow-x-auto; }
  .diff .fl{ @apply px-3.5 py-1.5 bg-white/[0.03] text-[#8a8a93] font-medium; }
  .diff .ln{ @apply block px-3.5 whitespace-pre; }
  .diff .ln.add{ @apply bg-sage/[0.09] text-[#9bd3a8]; }
  .diff .ln.del{ @apply bg-rose/[0.09] text-[#e2a3a7]; }
  .diff .ln.hh{ @apply bg-accent/[0.07] text-accent; }
  .diff .ln.ctx{ @apply text-[#74747e]; }

  /* 分隔符 */
  .divider{ @apply flex items-center gap-3 my-1 text-[10.5px] text-[#54545d]; }
  .divider .d-in{ @apply font-medium tracking-wide flex items-center gap-1.5; }
  .divider.accent .d-in{ @apply text-accent/80; }
  .divider.warn .d-in{ @apply text-sand/80; }

  .finding{ @apply px-3.5 py-3 border-b border-white/[0.04] last:border-0; }
  .finding .ft{ @apply text-[12.5px] font-medium text-[#c8c8cf] mb-1; }
  .finding .fb{ @apply text-[12px] leading-relaxed text-[#8a8a93]; }
  .finding .floc{ @apply text-[11px] font-mono text-[#54545d] mt-1.5; }

  /* 底部 dock 过滤胶囊 */
  .fpill{ @apply flex items-center gap-1.5 text-[11px] px-2.5 py-[5px] rounded-full
           text-[#74747e] transition-all duration-150; }
  .fpill .fd{ @apply w-[5px] h-[5px] rounded-full bg-current; }
  .fpill.on{ @apply text-[#d4d4da] bg-white/[0.06]; }
  .fpill:hover{ @apply bg-white/[0.04]; }

  .trunc{ @apply block w-fit mx-auto mb-7 text-center text-[11px] text-[#62626b]
           bg-white/[0.03] rounded-full py-1.5 px-4; }

  .dpill{ @apply flex-1 text-center text-[11px] py-[5px] rounded-[9px]
           text-[#74747e] cursor-pointer transition-all duration-150; }
  .dpill.on{ @apply text-[#d4d4da] bg-white/[0.06]; }
  .dpill:hover:not(.on){ @apply bg-white/[0.035]; }

  .tag{ @apply text-[9px] font-semibold uppercase tracking-wide px-1.5 py-[1px] rounded-[4px] flex-none; }
  .tag-codex{ @apply bg-sand/[0.16] text-sand; }
  .tag-claude{ @apply bg-accent/[0.18] text-accent; }

  .projsel{ @apply w-full text-[12px] text-[#bdbdc4] bg-white/[0.04] rounded-[11px]
             px-3 py-[7px] outline-none cursor-pointer ring-1 ring-white/[0.04]
             hover:ring-white/[0.09] transition; }

  /* 侧栏视图切换 + 用量报表 */
  .vtab{ @apply flex-1 text-center text-[12px] py-[6px] rounded-[10px] font-medium
          text-[#74747e] cursor-pointer transition-all duration-150; }
  .vtab.on{ @apply text-[#f0f0f3] bg-white/[0.07]; }
  .vtab:hover:not(.on){ @apply bg-white/[0.035]; }
  .gtab{ @apply text-[11px] px-2.5 py-[3px] rounded-[7px] text-[#74747e]
          cursor-pointer transition-all duration-150; }
  .gtab.on{ @apply text-[#f0f0f3] bg-white/[0.07]; }
  .gtab:hover:not(.on){ @apply bg-white/[0.035]; }
  .rsec{ @apply text-[10px] font-semibold tracking-[.1em] uppercase text-[#54545d] mb-2; }
  .rcard{ @apply flex flex-col gap-0.5 px-3 py-2.5 rounded-[12px]
           bg-white/[0.025] ring-1 ring-white/[0.05]; }
  .rcard .rk{ @apply text-[10px] text-[#62626b]; }
  .rcard .rv{ @apply text-[15px] font-semibold text-[#e6e6e8] tabular-nums; }
  .rbar{ @apply flex-1 min-w-0 max-w-[44px] min-h-[2px] rounded-t-[2px] bg-accent/60
          hover:bg-accent transition-colors cursor-default; }
  .rbar.last{ @apply bg-accent; }
  .pcard{ @apply flex flex-col gap-0.5 px-3 py-2.5 rounded-[12px] cursor-pointer
           bg-white/[0.025] ring-1 ring-white/[0.05] transition hover:bg-white/[0.045]; }
  .pcard.on{ @apply bg-accent/[0.10] ring-accent/40; }
  .rbtn{ @apply text-[10.5px] px-2 py-[3px] rounded-[7px] text-accent flex-none
          bg-accent/[0.12] hover:bg-accent/20 transition
          disabled:opacity-50 disabled:cursor-default; }
  .listdiv{ @apply mx-4 my-1.5 h-px bg-white/[0.05] flex-none; }
}
/* 原生 CSS：滚动条 / 关键帧 / markdown */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.14)}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
@keyframes breathe{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}
.ev.hidden,.ev.hideF{display:none!important}
/* ── macOS 窗口：标题栏拖拽区 / 内容区划分 ── */
.drag-region{-webkit-app-region:drag;-webkit-user-select:none;user-select:none;cursor:default}
button,input,textarea,select,a,.no-drag{-webkit-app-region:no-drag}
.tbstrip{display:none}
body.app{padding:0}
body.app #app{border-radius:0;box-shadow:none}
body.app .tbstrip{display:block;height:52px;flex:0 0 auto}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.05)}
.md{font-size:14px;line-height:1.7;color:#dcdce0}
.md p{margin:0 0 9px}.md p:last-child{margin:0}
.md ul{margin:5px 0 9px;padding-left:19px}.md li{margin:3px 0}
.md .md-h{font-weight:600;color:#f0f0f3;margin:12px 0 6px}
.md code{background:rgba(255,255,255,.06);padding:1.5px 5px;border-radius:5px;
  font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#b89ad6}
.md strong{color:#f4f4f6;font-weight:600}
.md a{color:#9aa0e8;text-decoration:underline;text-underline-offset:2px;
  text-decoration-color:rgba(154,160,232,.45);transition:color .12s,text-decoration-color .12s;
  word-break:break-all}
.md a:hover{color:#bcbff5;text-decoration-color:rgba(154,160,232,.9)}
.md a:visited{color:#9aa0e8}
.md pre.code{background:rgba(0,0,0,.45);border-radius:11px;padding:12px 14px;margin:9px 0;overflow-x:auto}
.md pre.code code{background:none;padding:0;color:#c4c8d6;font-size:12px;line-height:1.6;
  font-family:ui-monospace,Menlo,monospace}
.think-body .md{color:#9a9aa3;font-size:12.5px}

/* ───────────────────── 移动端适配（<768px） ─────────────────────
   原则：所有规则收敛在此 media query 内，桌面路径完全不动。
   断点 767px = Tailwind 默认 md 之下。 */
.only-mobile{display:none}
@media (max-width:767px){
  /* 全局：去边距/圆角；用 100dvh 让键盘弹起后 composer 不被顶飞 */
  /* overflow-x + touch-action 双保险：禁掉左右 rubber-band 与水平滚动 */
  html,body{overflow-x:hidden!important;max-width:100vw!important;
            overscroll-behavior-x:none}
  body{padding:0!important;height:100dvh;touch-action:pan-y}
  #app{border-radius:0!important;box-shadow:none!important;ring-width:0!important;
       max-width:100vw!important;overflow-x:hidden!important}
  #app > main,#scroll,#timeline{max-width:100vw!important;overflow-x:hidden}
  /* 隐藏 macOS 专属元素：拖拽条占位 + 红绿灯让位空 div */
  .tbstrip,.hide-mobile{display:none!important}
  .only-mobile{display:flex}
  /* 侧栏改成抽屉：固定在左侧，默认 -translate-x 隐藏 */
  #app > aside{
    position:fixed;left:0;top:0;bottom:0;z-index:60;
    width:min(86vw,332px);
    transform:translateX(-100%);
    transition:transform .25s cubic-bezier(.32,.72,0,1);
    box-shadow:6px 0 30px rgba(0,0,0,.5);
  }
  body.drawer-open #app > aside{transform:translateX(0)}
  /* 抽屉遮罩 */
  #drawerMask{
    position:fixed;inset:0;z-index:55;background:rgba(0,0,0,.55);
    backdrop-filter:blur(2px);
    opacity:0;pointer-events:none;transition:opacity .25s;
  }
  body.drawer-open #drawerMask{opacity:1;pointer-events:auto}
  /* 主区永远全宽；隐藏顶栏左侧 116px 占位 */
  #app > main > header > .hdr-spacer{display:none!important}
  /* barStatus 在移动端取自动宽度，紧贴右侧 */
  #barStatus{width:auto!important}
  /* composer 移动端：全宽贴底 + safe-area；去掉 780px / 56px 边距 */
  #composer{
    left:0!important;right:0!important;bottom:0!important;
    transform:none!important;
    width:100%!important;max-width:100%!important;
    padding:6px 8px calc(6px + env(safe-area-inset-bottom,8px)) 8px;
  }
  #composer > div{border-radius:16px}
  /* 隐藏 macOS 专属按钮（在 iTerm2 调起会话） */
  #resumeBtn{display:none!important}
  /* 设置面板：全屏 sheet + 顶部水平 tab 替代左侧 176px 导航 */
  #setPanel{
    width:100vw!important;height:100dvh!important;height:100vh!important;
    max-width:100vw!important;max-height:100dvh!important;
    border-radius:0!important;
    padding-top:env(safe-area-inset-top,0);
  }

<script>
"use strict";
// Token bootstrap：?t=xxx → 写 cookie → 清掉 URL 参数。
// 之后所有 fetch / EventSource 走同源 cookie，免改任何业务请求。
(function(){
  const u=new URL(location.href);
  const t=u.searchParams.get("t");
  if(t){
    // SameSite=Lax + 一年过期；非 https 也用，本地 LAN 无 secure 需求
    document.cookie="codex_token="+encodeURIComponent(t)+"; path=/; max-age=31536000; samesite=lax";
    u.searchParams.delete("t");
    history.replaceState(null,"",u.pathname+(u.search?u.search:"")+u.hash);
  }
})();
// 全局 JS 错误浮窗 —— WKWebView 没有可见控制台时，错误会显示在右下角红条
window.addEventListener("error",ev=>{
  try{
    let b=document.getElementById("__errbar");
    if(!b){
      b=document.createElement("div");b.id="__errbar";
      b.style.cssText="position:fixed;right:8px;bottom:8px;max-width:60vw;z-index:9999;"+
        "padding:8px 12px;background:#a83a3a;color:#fff;font:11px/1.4 monospace;"+
        "border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:pre-wrap;cursor:pointer";
      b.onclick=()=>b.remove();
      document.body.appendChild(b);
    }
    b.textContent="JS 错误："+(ev.message||"")+" @ "+(ev.filename||"").split("/").pop()+":"+(ev.lineno||"");
  }catch(_){}
});
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const sessions=new Map();
const pinned=new Set(); // 置顶会话 ID
const running=new Map(); // sid → {pid,agent,cwd,prompt,startedAt} —— 后端正在跑的 spawn 任务
let currentId=null, ctx=null, autoFollow=true, pendingNew=0, composerMode=false;
let curSummary=null, stat={events:0,tools:0,tokIn:0,tokOut:0,user:0,asst:0,ctxUsed:0,ctxWin:0};
const filters={chat:true,think:false,tool:false,system:false}; // 默认只显示对话
const TOOL_TYPES={function_call:1,custom_tool_call:1,local_shell_call:1,
  web_search_call:1,image_generation_call:1,exec_command_end:1,patch_apply_end:1};

function h(tag,attrs,...kids){
  const e=document.createElement(tag);
  if(attrs)for(const k in attrs){
    if(k==="class")e.className=attrs[k];
    else if(k==="html")e.innerHTML=attrs[k];
    else if(k==="text")e.textContent=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  for(const k of kids){if(k==null)continue;e.append(k.nodeType?k:document.createTextNode(k));}
  return e;
}
function relTime(ms){
  if(!ms)return"";
  const d=(Date.now()-ms)/1000;
  if(d<60)return"刚刚";
  if(d<3600)return Math.floor(d/60)+" 分钟前";
  if(d<86400)return Math.floor(d/3600)+" 小时前";
  if(d<604800)return Math.floor(d/86400)+" 天前";
  return new Date(ms).toLocaleDateString("zh-CN",{month:"2-digit",day:"2-digit"});
}
function clock(s){return s?new Date(s).toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"";}
function hhmm(s){return s?new Date(s).toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}):"";}
// 时长：毫秒 → 1h32m23s / 5m3s / 8s
function dur(ms){
  if(!ms||ms<0)return"";
  let s=Math.round(ms/1000);
  const h=Math.floor(s/3600);s%=3600;
  const m=Math.floor(s/60);s%=60;
  return(h?h+"h":"")+(h||m?m+"m":"")+s+"s";
}
function base(p){return p?p.split("/").filter(Boolean).pop():"";}
function num(n){return(n||0).toLocaleString("en-US");}
function shortSid(s){s=String(s||"");return s.length<=20?s:s.slice(0,8)+"****"+s.slice(-8);}

/* ── 轻量 markdown ── */
// URL 识别：http(s):// 与 www.，仅 ASCII 字符，中文/标点自然终止
const URL_RE=/(?:https?:\/\/|www\.)[A-Za-z0-9\-._~:\/?#\[\]@!$&'()*+,;=%]+/g;
function fmtText(raw){ // 转义 + 粗体
  return esc(raw).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}
function linkify(raw){ // 输入原始文本，输出：非链接转义，链接转锚点
  let out="",last=0,m;
  URL_RE.lastIndex=0;
  while((m=URL_RE.exec(raw))){
    let url=m[0];const start=m.index;
    let ch; // 修剪尾部标点，避免吞掉句末符号
    while((ch=url[url.length-1])&&".,;:!?'\"".indexOf(ch)>=0)url=url.slice(0,-1);
    while(url.endsWith(")")&&(url.split(")").length-1)>(url.split("(").length-1))url=url.slice(0,-1);
    while(url.endsWith("]")&&(url.split("]").length-1)>(url.split("[").length-1))url=url.slice(0,-1);
    out+=fmtText(raw.slice(last,start));
    const href=url.startsWith("www.")?"https://"+url:url;
    out+='<a href="'+esc(href)+'" target="_blank" rel="noopener noreferrer">'+esc(url)+'</a>';
    last=start+url.length; // 尾部被修剪的标点留给后续文本
  }
  return out+fmtText(raw.slice(last));
}
function mdInline(s){
  // 按反引号切分：inline code 段不做 linkify
  return String(s).split(/(`[^`]+`)/).map(seg=>{
    if(seg.length>1&&seg[0]==="`"&&seg[seg.length-1]==="`")
      return '<code>'+esc(seg.slice(1,-1))+'</code>';
    return linkify(seg);
  }).join("");
}
function renderMarkdown(text){
  const wrap=h("div",{class:"md"});
  String(text).split("```").forEach((seg,i)=>{
    if(i%2===1){
      const lines=seg.split("\n");
      if(lines.length&&/^[\w.+-]{0,18}$/.test(lines[0])&&lines[0]!=="")lines.shift();
      if(lines.length&&lines[lines.length-1]==="")lines.pop();
      wrap.append(h("pre",{class:"code"},h("code",{text:lines.join("\n")})));
      return;
    }
    let para=[],list=null;
    const fp=()=>{if(para.length){wrap.append(h("p",{html:para.join("<br>")}));para=[];}};
    const fl=()=>{if(list){wrap.append(list);list=null;}};
    for(const ln of seg.split("\n")){
      const t=ln.trimEnd();
      if(/^#{1,6}\s+/.test(t)){fp();fl();wrap.append(h("div",{class:"md-h",html:mdInline(t.replace(/^#{1,6}\s+/,""))}));}
      else if(/^\s*[-*]\s+/.test(t)){fp();if(!list)list=h("ul");list.append(h("li",{html:mdInline(t.replace(/^\s*[-*]\s+/,""))}));}
      else if(t.trim()===""){fp();fl();}
      else{fl();para.push(mdInline(t));}
    }
    fp();fl();
  });
  return wrap;
}

/* ── 通用构造 ── */
function rawBtn(obj){
  const pre=h("div",{class:"raw",text:JSON.stringify(obj,null,2)});
  const btn=h("button",{class:"raw-btn",text:"{ }",title:"原始 JSON",
    onclick:e=>{e.stopPropagation();pre.classList.toggle("show");}});
  return{btn,pre};
}
function card(o){
  const c=h("div",{class:"card"+(o.open?" open":"")});
  const head=h("div",{class:"ch"});
  head.append(h("div",{class:"ic "+(o.iccls||"tool"),text:o.ic||"●"}));
  head.append(h("span",{class:"lbl",text:o.lbl||""}));
  if(o.sub!=null)head.append(h("span",{class:"sub",text:o.sub}));
  if(o.stat)head.append(h("span",{class:"stat "+(o.statcls||"ok"),text:o.stat}));
  const{btn,pre}=rawBtn(o.obj);
  head.append(btn);
  head.append(h("span",{class:"caret",text:"▶"}));
  head.addEventListener("click",()=>c.classList.toggle("open"));
  c.append(head);
  const body=h("div",{class:"cbody"});
  if(o.body)body.append(o.body);
  body.append(pre);
  c.append(body);
  return c;
}
function divider(txt,cls){return h("div",{class:"divider "+(cls||"")},h("span",{class:"d-in",text:txt}));}
function firstLine(t){
  const l=String(t).replace(/\*\*/g,"").split("\n").find(x=>x.trim());
  return l?l.trim().slice(0,90):"";
}
function renderDiff(text){
  const d=h("div",{class:"diff"});
  for(const ln of String(text).split("\n")){
    let cls="ctx";
    if(ln.startsWith("@@"))cls="hh";
    else if(ln.startsWith("+"))cls="add";
    else if(ln.startsWith("-"))cls="del";
    d.append(h("span",{class:"ln "+cls,text:ln||" "}));
  }
  return d;
}
function fmtDur(d){
  if(typeof d==="number")return d.toFixed(2)+"s";
  if(d&&d.secs!=null)return(d.secs+(d.nanos||0)/1e9).toFixed(2)+"s";
  return"";
}

/* ── 按类型渲染事件 ── */
function renderEvent(o){
  const type=o.type,p=o.payload||{},pt=p.type,ts=o.timestamp;
  if(type==="session_meta")return null;
  if(type==="turn_context")
    return sysCard("⊹","sys","新一轮上下文",
      [p.model,p.cwd&&"cwd "+base(p.cwd),p.approval_policy&&"审批 "+p.approval_policy].filter(Boolean).join("  ·  "),o);
  if(type==="compacted")
    return{cat:"system",node:card({ic:"⊟",iccls:"sys",lbl:"上下文已压缩",sub:"查看压缩摘要",
      body:h("div",{class:"sys-body",text:p.message||""}),obj:o})};

  if(type==="event_msg")switch(pt){
    case"user_message":return msgEv("user","你","你",p.message||"",ts,o);
    case"agent_message":return null;
    case"agent_reasoning":return thinkEv(p.text||"",ts,o);
    case"task_started":return{cat:"system",node:divider("任务开始","")};
    case"task_complete":return{cat:"system",node:divider("任务完成","accent")};
    case"turn_aborted":return{cat:"system",node:divider("已中断 · "+(p.reason||""),"warn")};
    case"context_compacted":case"thread_name_updated":
    case"web_search_end":case"image_generation_end":return null;
    case"token_count":return null; // token 用量改为右下角悬浮显示
    case"exec_command_end":return execEv(p,ts,o);
    case"patch_apply_end":return patchEv(p,o);
    case"entered_review_mode":return{cat:"system",node:divider("进入审查模式","accent")};
    case"exited_review_mode":return reviewEv(p,o);
    default:return sysCard("·","sys",pt||"event",JSON.stringify(p).slice(0,110),o);
  }

  if(type==="response_item")switch(pt){
    case"message":return messageItem(p,ts,o);
    case"reasoning":{
      const txt=(p.summary&&p.summary.length?p.summary.map(s=>s.text||s).join("\n"):"")||p.content||"";
      return txt?thinkEv(txt,ts,o):null;
    }
    case"function_call":return funcCall(p,o);
    case"function_call_output":return funcOutput(p,o);
    case"custom_tool_call":return customCall(p,o);
    case"custom_tool_call_output":return customOutput(p,o);
    case"local_shell_call":return funcCall({name:"shell",arguments:JSON.stringify(p.action||{}),call_id:p.call_id},o);
    case"web_search_call":return searchEv(p,o);
    case"image_generation_call":return imageEv(p,o);
    default:return null;
  }
  return null;
}

function msgEv(kind,name,av,text,ts,o){
  const node=h("div",{class:"ev"});
  const m=h("div",{class:"msg "+(kind==="user"?"user":"asst")});
  m.append(h("div",{class:"av",text:av}));
  const body=h("div",{class:"body"});
  const{btn,pre}=rawBtn(o);
  const nm=h("div",{class:"name"},name,h("span",{class:"time",text:hhmm(ts)}),h("span",{style:"flex:1"}),btn);
  body.append(nm);
  if(kind==="asst"){
    body.append(renderMarkdown(text));
  }else{
    body.append(h("div",{class:"bubble"},h("div",{class:"md"},h("p",{html:mdInline(text).replace(/\n/g,"<br>")}))));
  }
  body.append(pre);
  m.append(body);node.append(m);
  return{cat:"chat",node};
}
function messageItem(p,ts,o){
  const text=(p.content||[]).map(c=>c.text||"").join("\n").trim();
  if(p.role==="assistant")return msgEv("asst","Codex","C",text||"(空)",ts,o);
  return{cat:"system",node:card({ic:"❮❯",iccls:"sys",
    lbl:p.role==="developer"?"开发者指令":"用户上下文注入",sub:p.role,
    body:h("div",{class:"sys-body",text}),obj:o})};
}
function thinkEv(text,ts,o){
  return{cat:"think",node:card({ic:"✦",iccls:"think",lbl:"推理",sub:firstLine(text),
    body:h("div",{class:"think-body"},renderMarkdown(text)),obj:o})};
}
function sysCard(ic,iccls,lbl,sub,o){
  return{cat:"system",node:card({ic,iccls,lbl,sub,obj:o,
    body:h("div",{class:"sys-body",text:JSON.stringify(o.payload,null,2)})})};
}
function execEv(p,ts,o){
  const cmd=Array.isArray(p.command)?p.command.join(" "):(p.command||"");
  const term=h("div",{class:"term"},h("span",{class:"cmd",text:cmd}));
  if(p.aggregated_output||p.stdout)term.append(h("span",{class:"out",text:p.aggregated_output||p.stdout}));
  term.append(h("span",{class:"meta",text:"退出码 "+p.exit_code+(p.duration?" · "+fmtDur(p.duration):"")}));
  const ok=p.exit_code===0;
  return{cat:"tool",node:card({ic:"›_",iccls:"exec",lbl:"命令执行",sub:firstLine(cmd),
    stat:ok?"完成":"失败",statcls:ok?"ok":"err",body:term,obj:o})};
}
function patchEv(p,o){
  const box=h("div"),ch=p.changes||{};
  for(const f in ch){
    box.append(h("div",{class:"diff"},h("div",{class:"fl",text:base(f)})));
    box.append(renderDiff(ch[f].unified_diff||""));
  }
  if(!Object.keys(ch).length)box.append(h("div",{class:"sys-body",text:p.stdout||""}));
  return{cat:"tool",node:card({ic:"◈",iccls:"patch",lbl:"应用补丁",
    sub:Object.keys(ch).map(base).join(", "),stat:p.success?"成功":"失败",
    statcls:p.success?"ok":"err",body:box,obj:o,open:true})};
}
function reviewEv(p,o){
  const r=p.review_output||{},box=h("div");
  box.append(h("div",{class:"finding"},
    h("div",{class:"ft",text:"结论："+(r.overall_correctness||"")}),
    h("div",{class:"fb",text:r.overall_explanation||""})));
  (r.findings||[]).forEach(f=>{
    const loc=f.code_location&&f.code_location.absolute_file_path;
    box.append(h("div",{class:"finding"},
      h("div",{class:"ft",text:f.title||""}),
      h("div",{class:"fb",text:f.body||""}),
      loc?h("div",{class:"floc",text:loc}):null));
  });
  return{cat:"tool",node:card({ic:"⚖",iccls:"patch",lbl:"审查结论",
    sub:(r.findings||[]).length+" 条发现",body:box,obj:o,open:true})};
}
function funcCall(p,o){
  let args={};
  try{args=JSON.parse(p.arguments||"{}");}catch(e){args=p.arguments;}
  const isShell=/exec|shell|bash|command/i.test(p.name||"")&&args&&args.cmd;
  const body=h("div");
  let sub,outTarget;
  if(isShell){
    const term=h("div",{class:"term"},h("span",{class:"cmd",text:args.cmd}));
    const slot=h("span",{class:"out"});slot.style.display="none";
    term.append(slot);body.append(term);
    sub=firstLine(args.cmd);outTarget=slot;
  }else{
    body.append(h("div",{class:"argblk",text:typeof args==="string"?args:JSON.stringify(args,null,2)}));
    sub=p.name||"";
    outTarget=h("div",{class:"term"});outTarget.style.borderTop="1px solid rgba(255,255,255,.04)";
    body.append(outTarget);
  }
  const c=card({ic:"⚙",iccls:"tool",lbl:p.name||"工具调用",sub,stat:"运行中",statcls:"run",body,obj:o});
  ctx.tools.set(p.call_id,{card:c,out:outTarget,shell:isShell});
  applyPair(p.call_id);
  return{cat:"tool",node:c};
}
function fillOutput(id,text,ok,extra){
  const t=ctx&&ctx.tools.get(id);
  if(!t)return false;
  if(t.isAsk){
    if(t.applyAnswers)t.applyAnswers(extra&&extra.answers,!!(extra&&extra.isError));
    return true;
  }
  const stat=t.card.querySelector(".stat");
  if(stat){stat.textContent=ok?"完成":"失败";stat.className="stat "+(ok?"ok":"err");}
  if(t.shell){t.out.style.display="block";t.out.textContent=text;}
  else{t.out.innerHTML="";t.out.append(h("span",{class:"out",text}));}
  const ev=t.card.closest(".ev");
  if(ev){
    ev.dataset.text=(ev.dataset.text||"")+" "+text.toLowerCase();
    const q=$("#q2").value.trim().toLowerCase();
    if(q&&ev.dataset.text.includes(q))ev.classList.remove("hideF");
  }
  return true;
}
function parseOut(text){
  let ok=true;
  try{const j=JSON.parse(text);
    if(j&&j.output!=null)text=j.output;
    if(j&&j.metadata&&j.metadata.exit_code!=null)ok=j.metadata.exit_code===0;}catch(e){}
  if(/exit code [1-9]|exited with code [1-9]/.test(text))ok=false;
  return{text,ok};
}
function funcOutput(p,o){
  const{text,ok}=parseOut(p.output||"");
  if(fillOutput(p.call_id,text,ok))return null;
  if(pairs&&pairs.calls.has(p.call_id))return null; // 调用在其它窗口，由其卡片填充
  return{cat:"tool",node:card({ic:"⮑",iccls:"tool",lbl:"工具输出",sub:firstLine(text),
    body:h("div",{class:"argblk",text}),obj:o})};
}
function customCall(p,o){
  const isPatch=/patch/i.test(p.name||"");
  const body=isPatch?renderDiff(p.input||""):h("div",{class:"argblk",text:p.input||""});
  const c=card({ic:isPatch?"◈":"⚙",iccls:isPatch?"patch":"tool",lbl:p.name||"自定义工具",
    sub:isPatch?"apply_patch":firstLine(p.input||""),
    stat:p.status==="completed"?"完成":"运行中",statcls:p.status==="completed"?"ok":"run",body,obj:o});
  const outT=h("div",{class:"term"});outT.style.borderTop="1px solid rgba(255,255,255,.04)";
  c.querySelector(".cbody").insertBefore(outT,c.querySelector(".raw"));
  ctx.tools.set(p.call_id,{card:c,out:outT,shell:false});
  applyPair(p.call_id);
  return{cat:"tool",node:c};
}
function customOutput(p,o){
  const{text,ok}=parseOut(p.output||"");
  if(fillOutput(p.call_id,text,ok))return null;
  if(pairs&&pairs.calls.has(p.call_id))return null;
  return{cat:"tool",node:card({ic:"⮑",iccls:"tool",lbl:"工具输出",sub:firstLine(text),
    body:h("div",{class:"argblk",text}),obj:o})};
}
function searchEv(p,o){
  const a=p.action||{};
  const q=a.query||(a.queries&&a.queries.join(" / "))||p.query||a.url||"";
  return{cat:"tool",node:card({ic:"⌕",iccls:"search",lbl:"网络搜索",sub:q,
    stat:p.status==="completed"?"完成":"运行中",statcls:p.status==="completed"?"ok":"run",
    body:h("div",{class:"sys-body",text:JSON.stringify(a,null,2)}),obj:o})};
}
function imageEv(p,o){
  return{cat:"tool",node:card({ic:"◭",iccls:"patch",lbl:"图像生成",
    sub:(p.status||"")+" · "+firstLine(p.revised_prompt||""),
    body:h("div",{class:"sys-body",text:p.revised_prompt||""}),obj:o})};
}

/* ── 时间线 ── */
function fmtTok(n){
  if(n>=1e9)return(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"k";
  return String(n);
}
function fmtCost(n){
  n=n||0;
  return n>=100?"$"+Math.round(n).toLocaleString("en-US"):"$"+n.toFixed(2);
}
function tallyCodex(o){
  const p=o.payload||{},pt=p.type;
  if(TOOL_TYPES[pt])stat.tools++;
  if(o.type==="event_msg"&&pt==="user_message")stat.user++;
  if(o.type==="response_item"&&pt==="message"&&p.role==="assistant")stat.asst++;
  if(o.type==="event_msg"&&pt==="token_count"){
    const i=p.info||{};
    const u=i.total_token_usage; // 累计值，最后一条为准
    if(u){stat.tokIn=u.input_tokens||0;stat.tokOut=u.output_tokens||0;}
    const last=i.last_token_usage; // 最近一轮的输入 = 当前上下文占用
    if(last&&last.input_tokens)stat.ctxUsed=last.input_tokens;
    if(i.model_context_window)stat.ctxWin=i.model_context_window;
  }
}
function tallyClaude(o){
  if(o.type==="assistant"){
    stat.asst++;
    const c=(o.message&&o.message.content)||[];
    for(const b of c)if(b&&b.type==="tool_use")stat.tools++;
    const u=o.message&&o.message.usage; // 每条消息独立，累加
    if(u){ // 上传含缓存命中，与 Codex 累计输入口径一致
      const inAll=(u.input_tokens||0)+(u.cache_creation_input_tokens||0)+(u.cache_read_input_tokens||0);
      stat.tokIn+=inAll;
      stat.tokOut+=(u.output_tokens||0);
      stat.ctxUsed=inAll; // 最近一条 assistant 的输入规模 = 当前上下文占用
      stat.ctxWin=1e6;    // Claude 上下文窗口 1M
    }
  }else if(o.type==="user"){
    const c=o.message&&o.message.content;
    if(!(Array.isArray(c)&&c.some(x=>x&&x.type==="tool_result")))stat.user++;
  }
}

/* ── Claude Code 事件渲染 ── */
function renderClaudeEvent(o){
  const t=o.type, ts=o.timestamp;
  if(t==="user"){
    const c=o.message&&o.message.content;
    if(typeof c==="string")return c.trim()?msgEv("user","你","你",c,ts,o):null;
    if(Array.isArray(c)){
      const out=[];
      for(const b of c){
        if(!b)continue;
        if(b.type==="text"&&b.text&&b.text.trim())out.push(msgEv("user","你","你",b.text,ts,o));
        else if(b.type==="image")out.push({cat:"chat",node:claudeImage(b,ts)});
        else if(b.type==="tool_result")out.push(claudeToolResult(b,o));
      }
      return out;
    }
    return null;
  }
  if(t==="assistant"){
    const c=(o.message&&o.message.content)||[];
    const out=[];
    for(const b of c){
      if(!b)continue;
      if(b.type==="text"&&b.text&&b.text.trim())out.push(msgEv("asst","Claude","C",b.text,ts,o));
      else if(b.type==="thinking")out.push(claudeThinking(b,ts,o));
      else if(b.type==="tool_use")out.push(claudeToolUse(b,o));
    }
    return out;
  }
  if(t==="system")
    return{cat:"system",node:card({ic:"⚙",iccls:"sys",lbl:"系统 · "+(o.subtype||"event"),
      sub:claudeSysSub(o),body:h("div",{class:"sys-body",text:JSON.stringify(o,null,2)}),obj:o})};
  if(t==="permission-mode")
    return{cat:"system",node:divider("权限模式 → "+(o.permissionMode||""),"accent")};
  if(t==="queue-operation")
    return{cat:"system",node:card({ic:"≡",iccls:"sys",lbl:"队列 · "+(o.operation||""),
      sub:o.content||"",body:h("div",{class:"sys-body",text:JSON.stringify(o,null,2)}),obj:o})};
  return null; // file-history-snapshot / last-prompt / attachment 略
}
function claudeThinking(b,ts,o){
  if(b.thinking&&b.thinking.trim())return thinkEv(b.thinking,ts,o);
  return{cat:"think",node:card({ic:"✦",iccls:"think",lbl:"推理",sub:"已加密",
    body:h("div",{class:"think-body",text:"（思考内容已加密）"}),obj:o})};
}
function claudeImage(b,ts){
  const s=b.source||{};
  const node=h("div",{class:"ev"}),m=h("div",{class:"msg user"});
  m.append(h("div",{class:"av",text:"你"}));
  const body=h("div",{class:"body"});
  body.append(h("div",{class:"name"},"你 · 图片",h("span",{class:"time",text:hhmm(ts)})));
  if(s.type==="base64"&&s.data){
    const img=h("img",{src:"data:"+(s.media_type||"image/png")+";base64,"+s.data});
    img.style.cssText="max-width:340px;max-height:340px;border-radius:12px;border:1px solid rgba(255,255,255,.07);margin-top:2px";
    body.append(img);
  }else body.append(h("div",{class:"bubble"},"[图片]"));
  m.append(body);node.append(m);
  return node;
}
function claudeToolUse(b,o){
  const name=b.name||"工具",inp=b.input||{};
  if(name==="AskUserQuestion")return claudeAskUser(b,o);
  const isBash=name==="Bash"&&inp.command;
  const isEdit=/^(Edit|MultiEdit|Write|NotebookEdit)$/.test(name);
  let body,sub,outTarget,shell=false;
  if(isBash){
    const term=h("div",{class:"term"},h("span",{class:"cmd",text:inp.command}));
    const slot=h("span",{class:"out"});slot.style.display="none";
    term.append(slot);
    body=term;sub=firstLine(inp.description||inp.command);outTarget=slot;shell=true;
  }else{
    body=h("div");
    body.append(isEdit?claudeEditBody(name,inp)
                      :h("div",{class:"argblk",text:JSON.stringify(inp,null,2)}));
    outTarget=h("div",{class:"term"});outTarget.style.borderTop="1px solid rgba(255,255,255,.04)";
    body.append(outTarget);
    sub=claudeToolSub(name,inp);
  }
  const c=card({ic:isBash?"›_":isEdit?"◈":"⚙",iccls:isBash?"exec":isEdit?"patch":"tool",
    lbl:name,sub,stat:"运行中",statcls:"run",body,obj:o});
  ctx.tools.set(b.id,{card:c,out:outTarget,shell});
  applyPair(b.id);
  return{cat:"tool",node:c};
}
function claudeToolSub(name,inp){
  return base(inp.file_path||inp.path||"")||inp.pattern||inp.url||
    firstLine(inp.command||inp.description||inp.prompt||"")||name;
}
function claudeEditBody(name,inp){
  const box=h("div");
  if(inp.file_path)box.append(h("div",{class:"diff"},h("div",{class:"fl",text:inp.file_path})));
  if(name==="Write")box.append(h("div",{class:"argblk",text:inp.content||""}));
  else if(name==="MultiEdit"&&Array.isArray(inp.edits))
    inp.edits.forEach(e=>box.append(diffPair(e.old_string,e.new_string)));
  else box.append(diffPair(inp.old_string,inp.new_string));
  return box;
}
function diffPair(oldS,newS){
  const d=h("div",{class:"diff"});
  if(oldS)String(oldS).split("\n").forEach(l=>d.append(h("span",{class:"ln del",text:"- "+l})));
  if(newS)String(newS).split("\n").forEach(l=>d.append(h("span",{class:"ln add",text:"+ "+l})));
  return d;
}
function claudeResultText(c){
  if(typeof c==="string")return c;
  if(Array.isArray(c))return c.map(x=>x&&x.type==="text"?x.text:(x&&x.type==="image"?"[图片]":"")).join("\n");
  return c==null?"":String(c);
}
function claudeToolResult(b,o){
  const text=claudeResultText(b.content),ok=!b.is_error;
  const ans=(o&&o.toolUseResult&&o.toolUseResult.answers)||null;
  if(fillOutput(b.tool_use_id,text,ok,{answers:ans,isError:!ok}))return null;
  if(pairs&&pairs.calls.has(b.tool_use_id))return null; // 调用在其它窗口
  return{cat:"tool",node:card({ic:"⮑",iccls:"tool",lbl:"工具结果",sub:firstLine(text),
    stat:ok?"完成":"失败",statcls:ok?"ok":"err",body:h("div",{class:"argblk",text}),obj:o})};
}
function claudeSysSub(o){
  if(o.subtype==="stop_hook_summary")
    return (o.hookCount||0)+" 个 hook"+(o.preventedContinuation?" · 已阻止继续":"");
  return o.level||o.content||"";
}

/* AskUserQuestion：渲染成对话气泡里的可点击问答卡片 —— 选中后通过
   /api/run (claude --resume <sid> -p) 把答案作为下一条 user message 回传 */
function claudeAskUser(b,o){
  const inp=b.input||{};
  const questions=Array.isArray(inp.questions)?inp.questions:[];
  const node=h("div",{class:"ev"});
  const m=h("div",{class:"msg asst"});
  m.append(h("div",{class:"av",text:"?"}));
  const body=h("div",{class:"body"});
  const {btn,pre}=rawBtn(o);
  body.append(h("div",{class:"name"},"Claude · 询问你",
    h("span",{class:"time",text:hhmm(o.timestamp)}),
    h("span",{style:"flex:1"}),btn));
  const ask=h("div",{class:"ask"});
  const sel=new Map();          // qi -> string | Set<string>
  const optsBoxes=[];           // qi -> options 容器，方便回填
  let submitted=false, done=false;

  questions.forEach((q,qi)=>{
    const qBox=h("div",{class:"ask-q"});
    if(q.header)qBox.append(h("div",{class:"ask-h",text:q.header}));
    if(q.question)qBox.append(h("div",{class:"ask-t",text:q.question}));
    const opts=h("div",{class:"ask-opts"});
    (q.options||[]).forEach(op=>{
      const label=op.label||"";
      const opBtn=h("button",{class:"ask-op",type:"button"});
      opBtn.append(h("div",{class:"ask-op-l",text:label}));
      if(op.description)opBtn.append(h("div",{class:"ask-op-d",text:op.description}));
      opBtn._label=label;
      opBtn.addEventListener("click",e=>{
        e.stopPropagation();
        if(done||submitted)return;
        if(q.multiSelect){
          const s=sel.get(qi)||new Set();
          if(s.has(label))s.delete(label); else s.add(label);
          sel.set(qi,s);
          opBtn.classList.toggle("sel",s.has(label));
        }else{
          sel.set(qi,label);
          opts.querySelectorAll(".ask-op").forEach(x=>x.classList.remove("sel"));
          opBtn.classList.add("sel");
        }
        updateSubmit();
      });
      opts.append(opBtn);
    });
    qBox.append(opts);
    ask.append(qBox);
    optsBoxes.push(opts);
  });

  const custom=h("textarea",{class:"ask-other",rows:"2",
    placeholder:"或自定义回复（留空走上方选项）…"});
  const submit=h("button",{class:"ask-sub",type:"button",text:"提交回答"});
  submit.disabled=true;
  ask.append(custom);ask.append(submit);

  function updateSubmit(){
    if(done||submitted){submit.disabled=true;return;}
    if(custom.value.trim()){submit.disabled=false;return;}
    const allAns=questions.every((q,qi)=>{
      const v=sel.get(qi);
      return q.multiSelect?(v&&v.size>0):(v!=null);
    });
    submit.disabled=!allAns;
  }
  custom.addEventListener("input",updateSubmit);

  submit.addEventListener("click",async e=>{
    e.stopPropagation();
    if(submitted||done)return;
    const s=curSummary||{};
    if(s.source!=="claude"||!s.sid||!s.cwd){
      submit.textContent="✗ 缺 sid/cwd，无法 resume";return;
    }
    submitted=true;submit.disabled=true;submit.textContent="发送中…";
    const free=custom.value.trim();
    let text;
    if(free){text=free;}
    else{
      // 复刻 Claude 原生交互的 tool_result 文案，多选用 ", " 分隔
      const parts=questions.map((q,qi)=>{
        const v=sel.get(qi);
        const a=q.multiSelect?[...(v||[])].join(", "):String(v==null?"":v);
        return '"'+q.question+'"="'+a+'"';
      });
      text="Your questions have been answered: "+parts.join(", ")+
        ". You can now continue with these answers in mind.";
    }
    try{
      const d=await(await fetch("/api/run",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({agent:"claude",mode:"resume",
          sid:s.sid,cwd:s.cwd,prompt:text})})).json();
      if(d.ok){submit.textContent="✓ 已发送，等待回复…";}
      else{submit.textContent="✗ "+(d.error||"发送失败");submitted=false;updateSubmit();}
    }catch(err){submit.textContent="✗ 网络异常";submitted=false;updateSubmit();}
  });

  body.append(ask);body.append(pre);
  m.append(body);node.append(m);

  // 回填：tool_result 到达时（pre-scan 或后到）
  //   ① 真实流式完成（有 answers）→ 回填已选 + 锁定交互
  //   ② -p 模式中断（is_error，无 answers）→ 保留交互 + 顶部加提示，
  //      让用户在 UI 选完后通过 claude --resume <sid> -p 继续对话
  function applyAnswers(answers,isError){
    if(answers&&typeof answers==="object"){
      done=true;submitted=true;
      custom.style.display="none";submit.style.display="none";
      ask.classList.add("done");
      questions.forEach((q,qi)=>{
        const a=answers[q.question];
        if(a==null)return;
        // 兼容 ", " / " / " 两种分隔，原生用 ", "
        const wanted=String(a).split(/, | \/ /);
        optsBoxes[qi].querySelectorAll(".ask-op").forEach(x=>{
          x.disabled=true;
          if(wanted.includes(x._label))x.classList.add("sel");
        });
      });
    }else if(isError&&!ask.querySelector(".ask-hint")){
      const hint=h("div",{class:"ask-hint",
        text:"⚠ -p 模式无法弹出 UI，对话已中断。请在此选择回答，提交后将以 claude --resume -p 继续对话"});
      ask.insertBefore(hint,ask.firstChild);
    }
  }

  ctx.tools.set(b.id,{card:node,out:null,isAsk:true,applyAnswers});
  applyPair(b.id);
  return{cat:"chat",node};
}

/* ── 时间线：窗口化渲染（仅渲染最新一段，向上滚动加载更早） ── */
let allEvents=[], renderedFrom=0, winClaude=false, pairs=null, loadingOlder=false;
const WIN=100; // 每次渲染/加载的事件数

function tallyOne(o,claude){ claude?tallyClaude(o):tallyCodex(o); }

// 预扫描：建立工具调用↔输出配对（与渲染顺序无关，使任意窗口都能正确配对）
function buildPairs(events,claude){
  const out=new Map(),calls=new Set();
  for(const o of events){
    if(claude){
      if(o.type==="assistant"){
        for(const b of (o.message&&o.message.content)||[])
          if(b&&b.type==="tool_use"&&b.id)calls.add(b.id);
      }else if(o.type==="user"&&Array.isArray(o.message&&o.message.content)){
        for(const b of o.message.content)
          if(b&&b.type==="tool_result"&&b.tool_use_id)
            out.set(b.tool_use_id,{text:claudeResultText(b.content),ok:!b.is_error,
              answers:(o.toolUseResult&&o.toolUseResult.answers)||null,
              isError:!!b.is_error});
      }
    }else if(o.type==="response_item"){
      const p=o.payload||{};
      if((p.type==="function_call"||p.type==="custom_tool_call"||p.type==="local_shell_call")&&p.call_id)
        calls.add(p.call_id);
      else if((p.type==="function_call_output"||p.type==="custom_tool_call_output")&&p.call_id)
        out.set(p.call_id,parseOut(p.output||""));
    }
  }
  return {out,calls};
}
// 工具卡片创建后，若预扫描已知其输出则立即填充
function applyPair(id){
  if(pairs&&pairs.out.has(id)){const r=pairs.out.get(id);fillOutput(id,r.text,r.ok,r);}
}

// 渲染单个事件，追加到 parent
function appendOne(o,parent,claude){
  let r;try{r=claude?renderClaudeEvent(o):renderEvent(o);}catch(e){r=null;}
  if(!r)return;
  const txt=JSON.stringify(o).slice(0,4000).toLowerCase();
  const q=composerMode?"":$("#q2").value.trim().toLowerCase();
  for(const item of (Array.isArray(r)?r:[r])){
    if(!item||!item.node)continue;
    let node=item.node;
    if(!node.classList.contains("ev")){const w=h("div",{class:"ev"});w.append(node);node=w;}
    node.dataset.cat=item.cat;
    node.dataset.text=txt;
    if(!filters[item.cat])node.classList.add("hidden");
    if(q&&!txt.includes(q))node.classList.add("hideF");
    parent.append(node);
  }
}
// 时间线窗口按"用户实际能看到的条数"度量，而非收到的原始事件数。
// 可见事件 = 未被分类筛选(hidden)、也未被搜索筛选(hideF)隐藏的事件。
function countVisible(){
  return $("#timeline").querySelectorAll(".ev:not(.hidden):not(.hideF)").length;
}
// 持续向前补渲染原始事件，直到 DOM 中可见事件数 ≥ need 或抵达会话开头。
// 返回是否补渲染过（窗口是否向前扩展）。
function ensureVisible(need){
  const tl=$("#timeline");
  let grew=false;
  while(renderedFrom>0&&countVisible()<need){
    const from=Math.max(0,renderedFrom-WIN);
    const frag=document.createDocumentFragment();
    for(let i=from;i<renderedFrom;i++)appendOne(allEvents[i],frag,winClaude);
    tl.insertBefore(frag,tl.querySelector(".ev"));
    renderedFrom=from;
    grew=true;
  }
  return grew;
}
// 向上滚动：再补足 WIN 条可见事件（保持视觉位置不跳动）
function loadOlder(){
  if(loadingOlder||renderedFrom<=0)return;
  loadingOlder=true;
  const sc=$("#scroll"),prevH=sc.scrollHeight,prevTop=sc.scrollTop;
  ensureVisible(countVisible()+WIN);
  sc.scrollTop=prevTop+(sc.scrollHeight-prevH);
  loadingOlder=false;
}
function appendEvents(list){ // 仅实时增量，追加到末尾
  const tl=$("#timeline");
  for(const o of list){stat.events++;tallyOne(o,winClaude);appendOne(o,tl,winClaude);}
}
function renderSession(d,keepScroll){
  ctx={tools:new Map()};
  curSummary=d.summary;
  winClaude=(d.summary||{}).source==="claude";
  allEvents=d.events||[];
  pairs=buildPairs(allEvents,winClaude);
  stat={events:d.total||0,tools:0,tokIn:0,tokOut:0,user:0,asst:0,ctxUsed:0,ctxWin:0};
  for(const o of allEvents)tallyOne(o,winClaude); // 全量统计（与窗口无关）
  setComposer(true); // 两种来源都开编写器；sendMessage 按 source 分发
  const tl=$("#timeline");tl.innerHTML="";
  $("#empty").style.display="none";
  tl.style.display="block";
  if(d.truncated)tl.append(h("div",{class:"trunc"},
    "更早的事件未载入（会话过大，共 "+num(d.total)+" 条）"));
  renderedFrom=Math.max(0,allEvents.length-WIN); // 只渲染最新窗口
  for(let i=renderedFrom;i<allEvents.length;i++)appendOne(allEvents[i],tl,winClaude);
  // 最新窗口若可见事件不足（整片是工具/思考等被默认筛选隐藏的事件），
  // 向前补窗直到凑够一屏可见内容 —— 用户看到的是消息，不是原始事件数。
  ensureVisible(WIN);
  drawHeader();
  const sc=$("#scroll");
  // 切回看过的会话：恢复离开时的滚动位置；首次打开：落到最新一条
  sc.scrollTop=(keepScroll&&scrollMem.has(currentId))?scrollMem.get(currentId):sc.scrollHeight;
}
function drawHeader(){
  if(sidebarView==="report")return; // 报表视图下保留「用量报表」标题，不被会话信息覆盖
  const s=curSummary||{};
  $("#barTitle").textContent=s.title||"(无标题会话)";
  const parts=[s.model,s.cwd&&base(s.cwd),s.gitBranch&&("⎇ "+s.gitBranch),
    s.agentRole&&("⊂ "+s.agentRole),num(stat.events)+" 事件",
    stat.tools&&(stat.tools+" 工具"),clock(s.startTime)].filter(Boolean);
  $("#barSub").textContent=parts.join("   ·   ");
  const st=$("#barStatus");st.innerHTML="";
  st.append(h("span",{class:"pill"},
    h("span",{class:"dot "+(s.active?"live":"idle")}),s.active?"实时":"已结束"));
  // 后端正在 spawn 这个会话的 CLI → 让用户能看到 + 一键终止
  if(s.sid&&running.has(s.sid)){
    const info=running.get(s.sid);
    const ago=Math.max(0,Math.round((Date.now()-(info.startedAt||Date.now()))/1000));
    const dur=ago<60?ago+"s":Math.round(ago/60)+"m";
    const btn=h("button",{
      class:"pill",
      style:"margin-left:6px;cursor:pointer;color:#e0879a;border-color:rgba(224,135,154,.35)",
      title:"后台 "+(info.agent||"")+" 进程 pid "+(info.pid||"?")+" 已运行 "+dur+"，点击终止",
      onclick:()=>killRunning(s.sid)
    },h("span",{style:"color:#e0879a;margin-right:4px"},"⏹"),"终止");
    st.append(h("span",{class:"pill",style:"margin-left:6px;color:#d8b46a;border-color:rgba(216,180,106,.35)",
      title:"该会话当前由本应用后端在 spawn"},
      h("span",{style:"margin-right:4px"},"⚡"),"后端运行中 · "+dur));
    st.append(btn);
  }
  drawTokens();
}
async function killRunning(sid){
  if(!sid||!running.has(sid))return;
  if(!confirm("确定终止该会话的后端 CLI 进程？\n（SIGTERM，2s 后未退则 SIGKILL）"))return;
  try{
    const d=await(await fetch("/api/run/kill?sid="+encodeURIComponent(sid),
      {method:"POST"})).json();
    if(!d.ok)alert("终止失败："+(d.error||""));
  }catch(e){alert("终止失败："+(e.message||""));}
}
// 工具栏中部用量统计：图标即标签，紧凑显示，随事件流实时更新
function drawTokens(){
  const el=$("#tokDock");
  const sep='<span style="color:#3a3a42;margin:0 9px">·</span>';
  // 图标作前缀（暗色），值用主色 —— 省掉"上传/下载/上下文"等冗余文字
  const seg=(col,icon,val,tip)=>'<span style="color:'+col+'"'+
    (tip?' title="'+tip+'"':'')+
    '><span style="color:#5c5c66;margin-right:3px">'+icon+'</span>'+val+'</span>';
  const segs=[];
  if(stat.tokIn>0||stat.tokOut>0){
    segs.push(seg('#84cabb','↑',fmtTok(stat.tokIn),'上传 token（含缓存命中）'));
    segs.push(seg('#9aa0e8','↓',fmtTok(stat.tokOut),'下载 token'));
  }
  if(stat.ctxUsed>0&&stat.ctxWin>0){
    const pct=stat.ctxUsed/stat.ctxWin;
    const col=pct<0.5?'#84cabb':pct<0.8?'#d8b46a':'#e0879a';
    segs.push(seg(col,'◰',fmtTok(stat.ctxUsed)+' / '+fmtTok(stat.ctxWin),
      '窗口使用 · 最近一轮占用上下文 '+Math.round(pct*100)+'%'));
  }
  const s=curSummary||{};
  const d=s.startTime?dur((s.mtime||0)-Date.parse(s.startTime)):'';
  if(d)segs.push(seg('#9a9aa3','⧖',d,'运行时间（首条→末条事件）'));
  el.innerHTML=segs.join(sep);
}
// 切换底部输入框：会话视图=消息编写器；报表/无会话=对话内查找
function setComposer(on){
  composerMode=on;
  const ta=$("#q2"),btn=$("#sendBtn"),icon=$("#q2icon");
  ta.value="";ta.style.height="auto";
  if(on){
    ta.placeholder=composerPlaceholder();
    icon.textContent="›";
    btn.classList.remove("hidden");btn.classList.add("flex");
  }else{
    ta.placeholder="在当前对话中查找…";
    icon.textContent="⌕";
    btn.classList.add("hidden");btn.classList.remove("flex");
  }
}
function composerPlaceholder(){
  const src=(curSummary||{}).source;
  if(src==="claude")return"给 Claude 发送消息，回车后台执行…";
  if(src==="codex") return"给 Codex 发送消息，回车后台执行…";
  return"输入消息，回车后台执行…";
}
// 发送消息：
//   Codex  → /api/send（原 codex exec resume 模板，保留兼容）
//   Claude → /api/run 走 claude --resume <sid> -p <msg>，需要 cwd（取会话 cwd）
async function sendMessage(){
  if(!composerMode||!currentId)return;
  const ta=$("#q2"),msg=ta.value.trim();
  if(!msg)return;
  const s=curSummary||{};
  if(s.source==="claude"&&!s.cwd){
    ta.placeholder="✗ 该 Claude 会话无 cwd，无法 resume";return;
  }
  ta.value="";ta.style.height="auto";
  const def=composerPlaceholder();
  try{
    let d;
    if(s.source==="claude"){
      d=await(await fetch("/api/run",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({agent:"claude",mode:"resume",
          sid:s.sid,cwd:s.cwd,prompt:msg})})).json();
    }else{
      d=await(await fetch("/api/send?id="+encodeURIComponent(currentId),
        {method:"POST",body:msg})).json();
    }
    if(d.ok)ta.placeholder="✓ 已发送，后台执行中…";
    else{ta.placeholder="✗ "+(d.error||"发送失败");ta.value=msg;}
  }catch(e){ta.placeholder="✗ 发送失败";ta.value=msg;}
  setTimeout(()=>{if(composerMode)ta.placeholder=def;},3500);
}

/* ── 侧栏列表 ── */
let dateFilter="today", srcFilter="all", projectFilter="all", projKey="";
function claudeProject(s){
  return s.source==="claude"?(String(s.id).split("/")[1]||""):"";
}
function projLabel(s){
  if(s.cwd){const p=s.cwd.split("/").filter(Boolean);return p.slice(-2).join("/")||s.cwd;}
  return claudeProject(s);
}
function refreshProjects(){
  // 项目 → {标签, 最近活动时间}（取该项目下所有会话的最大 mtime）
  const map=new Map();
  for(const s of sessions.values()){
    if(s.source!=="claude")continue;
    const p=claudeProject(s);
    if(!p)continue;
    const e=map.get(p);
    if(!e)map.set(p,{label:projLabel(s),mtime:s.mtime||0});
    else if((s.mtime||0)>e.mtime)e.mtime=s.mtime||0;
  }
  // 按最近操作过的项目降序排列
  const arr=[...map.entries()].sort((a,b)=>b[1].mtime-a[1].mtime);
  const key=arr.map(x=>x[0]).join("|");
  if(key===projKey)return; // 顺序未变则不重建
  projKey=key;
  const sel=$("#projSel");sel.innerHTML="";
  sel.append(h("option",{value:"all"},"全部项目 · "+arr.length));
  arr.forEach(([p,e])=>
    sel.append(h("option",{value:p},e.label+"   ·   "+relTime(e.mtime))));
  sel.value=map.has(projectFilter)?projectFilter:"all";
  projectFilter=sel.value;
}
function inRange(mtime){
  if(dateFilter==="all"||!mtime)return true;
  const now=new Date(),d=new Date(mtime);
  if(dateFilter==="today")return d.toDateString()===now.toDateString();
  if(dateFilter==="month")
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(dateFilter==="week"){
    const start=new Date(now);
    start.setHours(0,0,0,0);
    start.setDate(now.getDate()-((now.getDay()+6)%7)); // 周一为一周起点
    return d>=start;
  }
  return true;
}
// 会话创建时间（首个事件的时间戳），缺失时回退到 mtime。
// 创建时间恒定不变，用作稳定排序键，避免列表随实时活动重新洗牌。
function ctime(s){
  const t=s.startTime?Date.parse(s.startTime):0;
  return t||s.mtime||0;
}
// 构建单个会话列表项
// opts: { sub:true → 子代理行；childCount:N → 父项显示折叠控件；expanded:true → 展开态；last:true → 最后一个子项裁断 spine }
function buildItem(s,opts){
  opts=opts||{};
  const cls=["item"];
  if(s.id===currentId)cls.push("sel");
  if(opts.sub)cls.push("sub");
  if(opts.last)cls.push("last");
  if(opts.expanded)cls.push("exp");
  const it=h("div",{class:cls.join(" "),"data-id":s.id,
    "data-sid":s.sid||"",
    onclick:()=>openSession(s.id),
    onmouseenter:()=>prefetchOnHover(s.id),
    onmouseleave:()=>clearTimeout(hoverTimer)});
  // 显示态：父项汇总自身与所有子代理（aggMtime/aggActive 已注入到副本）
  const showMtime=s._aggMtime||s.mtime;
  const showActive=s._aggActive!==undefined?s._aggActive:s.active;
  const titleRow=h("div",{class:"flex items-center gap-2"},
    h("span",{class:"dot "+(showActive?"live":"idle")}),
    h("span",{class:"ttl",text:s.title||"(无标题会话)"}));
  if(pinned.has(s.id))titleRow.append(h("span",{class:"pin",text:"★"}));
  // 父项：右上角折叠箭头 + 子代理计数徽章
  if(opts.childCount){
    const toggle=e=>{e.stopPropagation();toggleSubExpanded(s.sid);};
    titleRow.append(h("span",{class:"subcnt",title:opts.childCount+" 个子代理",
      onclick:toggle},"⊂"+opts.childCount));
    titleRow.append(h("span",{class:"chev",title:opts.expanded?"折叠":"展开",
      onclick:toggle},h("span",{class:"ic",text:"▸"})));
  }
  it.append(titleRow);
  if(s.preview)it.append(h("div",{class:"prev",text:s.preview}));
  const meta=h("div",{class:"metaline"},
    h("span",{class:"tag tag-"+s.source,text:s.source}),
    h("span",{class:"mtime",text:relTime(showMtime)}));
  // 子代理行省 role 徽章（行本身已经在缩进里表达了身份）
  if(s.agentRole&&!opts.sub)meta.append(h("span",{class:"badge",text:s.agentRole}));
  if(s.sid)meta.append(h("span",{class:"sid",title:s.sid,text:shortSid(s.sid)}));
  it.append(meta);
  return it;
}
/* 子代理展开状态：持久化按父 sid 记忆，默认全折叠 */
const SUBEXP_KEY="codexui.subagentExpanded";
let subExpanded=new Set();
try{const raw=localStorage.getItem(SUBEXP_KEY);
  if(raw)subExpanded=new Set(JSON.parse(raw));}catch(e){}
function saveSubExpanded(){
  try{localStorage.setItem(SUBEXP_KEY,JSON.stringify([...subExpanded]));}catch(e){}
}
function toggleSubExpanded(sid){
  if(!sid)return;
  if(subExpanded.has(sid))subExpanded.delete(sid);else subExpanded.add(sid);
  saveSubExpanded();renderList();
}
function expandAllSub(){
  for(const s of sessions.values())if(s.parentSid)subExpanded.add(s.parentSid);
  saveSubExpanded();renderList();
}
function collapseAllSub(){subExpanded.clear();saveSubExpanded();renderList();}

// 列表行可以是单个会话项，或一个『父+子』分组（折叠态只渲染父，展开态再追加子）
// listRows 元素：{kind:"item",s} | {kind:"group",parent,children} | {kind:"divider"}
let listRows=[], listShown=0;
const LIST_CHUNK=120;
function appendRow(frag,row){
  if(row.kind==="divider"){frag.append(h("div",{class:"listdiv"}));return;}
  if(row.kind==="item"){frag.append(buildItem(row.s));return;}
  // group：父 + 可选的子项
  const expanded=subExpanded.has(row.parent.sid);
  frag.append(buildItem(row.parent,{childCount:row.children.length,expanded}));
  if(expanded){
    row.children.forEach((c,i)=>
      frag.append(buildItem(c,{sub:true,last:i===row.children.length-1})));
  }
}
function listChunk(){
  const lst=$("#list"),frag=document.createDocumentFragment();
  const end=Math.min(listShown+LIST_CHUNK,listRows.length);
  for(let i=listShown;i<end;i++)appendRow(frag,listRows[i]);
  lst.append(frag);
  listShown=end;
}
// 关键词命中工具
function matchKeyword(s,q){
  if(!q)return true;
  return ((s.title||"")+(s.preview||"")+(s.cwd||"")+(s.sid||"")+
          (s.gitBranch||"")+(s.agentRole||"")).toLowerCase().includes(q);
}
function renderList(){
  refreshProjects();
  const q=$("#q").value.trim().toLowerCase();
  // 1) 收集所有会话；按 parentSid 分组（仅 Claude 子代理有 parentSid）
  const childrenBySid=new Map();       // parentSid → 子代理[]
  const all=[...sessions.values()];
  for(const s of all){
    if(s.source==="claude"&&s.parentSid){
      const arr=childrenBySid.get(s.parentSid)||[];
      arr.push(s);childrenBySid.set(s.parentSid,arr);
    }
  }
  // 2) 自动展开命中的父项（搜索匹配到子代理时）
  if(q){
    for(const [psid,kids] of childrenBySid){
      if(kids.some(c=>matchKeyword(c,q)))subExpanded.add(psid);
    }
  }
  // 3) 过滤函数（不含子代理 — 子代理跟随父项）
  const passSrc=s=>{
    if(srcFilter!=="all"&&s.source!==srcFilter)return false;
    if(srcFilter==="claude"&&projectFilter!=="all"&&claudeProject(s)!==projectFilter)return false;
    return true;
  };
  const passDate=s=>pinned.has(s.id)||inRange(s._aggMtime||s.mtime);
  // 4) 顶层 = 非子代理 + 找不到父的孤儿子代理（防止孤儿被吞掉）
  const sidIndex=new Set(all.filter(s=>s.sid).map(s=>s.sid));
  const tops=[];
  for(const s of all){
    if(s.source==="claude"&&s.parentSid){
      if(sidIndex.has(s.parentSid))continue; // 有父，归到 group
    }
    tops.push(s);
  }
  // 5) 给每个顶层会话注入聚合 mtime/active（含子代理活动），用于排序与展示
  for(const s of tops){
    const kids=(s.sid&&childrenBySid.get(s.sid))||[];
    let m=s.mtime||0,active=!!s.active;
    for(const c of kids){
      if((c.mtime||0)>m)m=c.mtime||0;
      if(c.active)active=true;
    }
    s._aggMtime=m;s._aggActive=active;
  }
  // 6) 过滤 + 排序：搜索时，父项匹配或任一子代理匹配都保留
  const visible=tops.filter(s=>{
    if(!passSrc(s))return false;
    if(!passDate(s))return false;
    if(!q)return true;
    if(matchKeyword(s,q))return true;
    const kids=(s.sid&&childrenBySid.get(s.sid))||[];
    return kids.some(c=>matchKeyword(c,q));
  }).sort((a,b)=>{
    const pa=pinned.has(a.id),pb=pinned.has(b.id);
    if(pa!==pb)return pa?-1:1;
    return ctime(b)-ctime(a); // 稳定的创建时间序，避免子代理活跃时父项乱跳
  });
  // 7) 组装 listRows；置顶组与其余之间插分隔线
  listRows=[];let pinTop=0;
  for(const s of visible)if(pinned.has(s.id))pinTop++;
  visible.forEach((s,i)=>{
    if(i===pinTop&&pinTop>0&&pinTop<visible.length)listRows.push({kind:"divider"});
    const kids=(s.sid&&childrenBySid.get(s.sid))||[];
    if(kids.length){
      // 子项按 mtime 倒序，搜索时把命中的子项放前面
      const sortedKids=[...kids].sort((a,b)=>(b.mtime||0)-(a.mtime||0));
      listRows.push({kind:"group",parent:s,children:sortedKids});
    }else{
      listRows.push({kind:"item",s});
    }
  });
  const lst=$("#list"),keepTop=lst.scrollTop;
  lst.innerHTML="";listShown=0;
  // 计数：父项+子代理（用户期望看到总数，与之前平铺一致）
  let total=visible.length;
  for(const s of visible)total+=((s.sid&&childrenBySid.get(s.sid))||[]).length;
  $("#sCount").textContent=total;
  listChunk();
  while(listShown<listRows.length&&lst.scrollHeight<keepTop+lst.clientHeight+240)listChunk();
  lst.scrollTop=keepTop;
}

async function togglePin(id){

// 把"列表项 → 菜单项数组"逻辑抽出，桌面右键和移动端长按共用
function buildListItemMenu(it){
  const items=[];
  if(it){
    const id=it.dataset.id, sid=it.dataset.sid;
    const sess=sessions.get(id);
    items.push({label:pinned.has(id)?"取消置顶":"★ 置顶",run:()=>togglePin(id)});
    if(it.classList.contains("exp"))
      items.push({label:"折叠子代理",run:()=>toggleSubExpanded(sid)});
    else if(sid&&[...sessions.values()].some(s=>s.parentSid===sid))
      items.push({label:"展开子代理",run:()=>toggleSubExpanded(sid)});
    // 分享该会话深链（同一 Wi-Fi 打开直达）— 缺 sid 的会话无法被定位，灰掉
    if(sess&&sess.sid)
      items.push({label:"🔗 分享会话",run:()=>window.openShareModal&&window.openShareModal(sess)});
    if(sess&&sess.sid)
      items.push({label:"📋 复制 session id",run:()=>copyText(sess.sid)});
    if(sess&&sess.file)
      items.push({label:"📝 用 VSCode 打开 jsonl",run:()=>openInEditor(sess.file)});
    items.push({div:true});
  }
  items.push({label:"展开全部子代理",run:expandAllSub});
  items.push({label:"折叠全部子代理",run:collapseAllSub});
  return items;
}

(function setupLongPress(){
  const LIST=$("#list");let timer=null,startX=0,startY=0,target=null;
  const cancel=()=>{if(timer){clearTimeout(timer);timer=null;}target=null;};
  LIST.addEventListener("pointerdown",e=>{
    if(e.pointerType==="mouse")return; // 仅触屏；鼠标走右键

})();

async function loadStats(){

// 周期定义：今日 / 本周 / 本月 / 累计
function periodDefs(){
  const now=new Date(),p2=n=>String(n).padStart(2,"0");
  const ymd=d=>d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());
  const today=ymd(now);
  const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));
  const weekStart=ymd(mon), monthPfx=now.getFullYear()+"-"+p2(now.getMonth()+1);
  return [
    {key:"today",label:"今日",test:e=>e.date===today},
    {key:"week", label:"本周",test:e=>e.date>=weekStart},
    {key:"month",label:"本月",test:e=>e.date.slice(0,7)===monthPfx},
    {key:"all",  label:"累计",test:()=>true},
  ];
}
// 当前选中周期内的会话集合
function periodEntries(){
  const def=periodDefs().find(d=>d.key===statsPeriod)||periodDefs()[3];
  return statsRaw.filter(e=>e.date&&def.test(e));
}
// 周期概览：四张卡可点选，点击即驱动下方所有统计
function reportPeriods(){
  const grid=h("div",{class:"grid grid-cols-4 gap-3"});
  periodDefs().forEach(def=>{
    let n=0,cost=0,out=0;
    for(const e of statsRaw)if(e.date&&def.test(e)){n++;cost+=e.cost;out+=e.tokOut;}
    grid.append(h("div",{class:"pcard"+(statsPeriod===def.key?" on":""),
      onclick:()=>{statsPeriod=def.key;renderReport();}},
      h("div",{class:"rk",text:def.label}),
      h("div",{class:"rv text-[22px]",style:"color:#84cabb"},fmtCost(cost)),
      h("div",{class:"text-[10.5px] text-[#62626b] mt-0.5",
        text:num(n)+" 会话 · 输出 "+fmtTok(out)})));
  });
  return grid;
}
// 趋势：累计按月、其余周期按天分桶（粒度随周期自动切换）
function reportTrend(entries){
  const byMonth=statsPeriod==="all";
  const bmap=new Map();
  for(const e of entries){
    if(!e.date)continue;
    const k=byMonth?e.date.slice(0,7):e.date;
    let b=bmap.get(k);
    if(!b){b={key:k,sessions:0,cost:0,tok:0};bmap.set(k,b);}
    b.sessions++;b.cost+=e.cost;b.tok+=e.tokIn+e.tokCache+e.tokOut;
  }
  const buckets=[...bmap.values()].sort((a,b)=>a.key<b.key?-1:1);
  if(!buckets.length)return h("div",{class:"text-[12px] text-[#54545d]"},"无数据");
  const max=Math.max(1e-9,...buckets.map(b=>b.cost));
  const bars=h("div",{class:"flex items-end gap-[3px] h-[150px]"});
  buckets.forEach((b,i)=>{
    const bar=h("div",{class:"rbar"+(i===buckets.length-1?" last":""),
      title:b.key+"  ·  "+fmtCost(b.cost)+" · "+b.sessions+" 会话 · "+fmtTok(b.tok)+" token"});
    bar.style.height=Math.max(2,Math.round(b.cost/max*100))+"%";
    bars.append(bar);
  });
  return h("div",{},bars,
    h("div",{class:"flex justify-between mt-2 text-[10px] text-[#4a4a52] tabular-nums"},
      h("span",{text:buckets[0].key}),
      h("span",{class:"text-[#62626b]",text:"柱高 = 成本 · 峰值 "+fmtCost(max)}),
      h("span",{text:buckets[buckets.length-1].key})));
}

// 通用排行卡：按 keyFn 分组、按成本降序，画横条
function reportRank(entries,keyFn,limit){
  const m=new Map();
  for(const e of entries){
    const k=keyFn(e)||"—";

/* ── 会话详情缓存：看过的会话切回即时呈现，悬停预取让首次点击也无感 ── */
const detailCache=new Map();    // id → 详情 JSON（LRU，最近使用置末）
const detailInflight=new Map(); // id → 进行中的请求 Promise（去重）
const scrollMem=new Map();      // id → 离开该会话时的滚动位置
const DETAIL_CACHE_MAX=8;
function cacheGet(id){
  const d=detailCache.get(id);
  if(d){detailCache.delete(id);detailCache.set(id,d);} // 命中即标记为最近使用
  return d;
}
function cachePut(id,d){
  detailCache.delete(id);detailCache.set(id,d);
  while(detailCache.size>DETAIL_CACHE_MAX)
    detailCache.delete(detailCache.keys().next().value); // 淘汰最久未用
}
// 取会话详情：命中缓存 / 复用进行中的请求 / 否则发起请求
function fetchDetail(id){
  const c=cacheGet(id);
  if(c)return Promise.resolve(c);
  const inflight=detailInflight.get(id);
  if(inflight)return inflight;
  const p=fetch("/api/session?id="+encodeURIComponent(id))
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{detailInflight.delete(id);cachePut(id,d);return d;},
          e=>{detailInflight.delete(id);throw e;});
  detailInflight.set(id,p);
  return p;
}
// 悬停预取：鼠标在某条上停留 140ms 即后台拉取，点击时通常已就绪
let hoverTimer=null;
function prefetchOnHover(id){
  clearTimeout(hoverTimer);
  if(id===currentId||detailCache.has(id)||detailInflight.has(id))return;
  hoverTimer=setTimeout(()=>fetchDetail(id).catch(()=>{}),140);
}

async function openSession(id){
  if(currentId&&currentId!==id)scrollMem.set(currentId,$("#scroll").scrollTop);
  currentId=id;
  markSelected(id);
  const cached=cacheGet(id);
  if(cached){ // 命中缓存：原样恢复（含滚动位置），零等待
    renderSession(cached,true);
    pendingNew=0;$("#jump").classList.add("hidden");
    return;
  }
  try{
    const data=await fetchDetail(id);
    if(id!==currentId)return; // 切换过快：丢弃过期会话的响应
    renderSession(data,false);
  }catch(e){
    if(id!==currentId)return;
    $("#timeline").style.display="none";
    $("#empty").style.display="flex";
    $("#tokDock").innerHTML="";
  }
  pendingNew=0;$("#jump").classList.add("hidden");
}

/* ── 实时 SSE ── */
function connectStream(){
  const es=new EventSource("/api/stream");
  es.onmessage=ev=>{
    let d;try{d=JSON.parse(ev.data);}catch(e){return;}
    if(d.t==="session"){
      sessions.set(d.session.id,d.session);
      const cd=detailCache.get(d.session.id);
      if(cd)cd.summary=d.session; // 同步刷新缓存详情里的摘要
      scheduleList(); // 防抖刷新会话列表
      if(d.session.id===currentId){curSummary=d.session;drawHeader();}
    }else if(d.t==="append"){
      detailCache.delete(d.id); // 该会话有新事件，缓存作废，下次切回重新拉取
      if(d.id!==currentId)return;
      const tl=$("#timeline"),before=tl.children.length;
      appendEvents(d.events);
      drawHeader();
      for(let i=before;i<tl.children.length;i++)tl.children[i].classList.add("glow");
      const sc=$("#scroll");
      const near=sc.scrollHeight-sc.scrollTop-sc.clientHeight<160;
      if(autoFollow&&near){
        requestAnimationFrame(()=>{sc.scrollTop=sc.scrollHeight;});
      }else{
        pendingNew+=d.events.length;
        $("#jumpN").textContent=pendingNew+" 条新消息";
        $("#jump").classList.remove("hidden");
        $("#jump").classList.add("flex");
      }
    }else if(d.t==="stats"){
      statsBusy=!!d.computing;
      if(!statsBusy)statsRaw=null;        // 计算完成：作废本地缓存，下次渲染重拉
      if(d.computedAt)statsAt=d.computedAt;
      if(sidebarView==="report")
        (statsRaw===null&&!statsBusy)?loadStats():renderReport();
    }else if(d.t==="update"){
      // App 自动更新状态推送：刷新关于页 + 顶栏角标
      applyUpdateState(d);
    }else if(d.t==="running"){
      // 后端 spawn 状态变更：维护本地 map，若与当前会话相关则刷新 header
      if(d.on){running.set(d.sid,{pid:d.pid,agent:d.agent,cwd:d.cwd,prompt:d.prompt,startedAt:d.startedAt});}
      else{running.delete(d.sid);}
      if(curSummary&&curSummary.sid===d.sid)drawHeader();
      // 列表项可能也要标记，留给以后；先只刷 header
    }
  };
}

  row._get=()=>({repo:repoIn.value.trim(),localPath:pathIn.value.trim(),
    branch:branchIn.value.trim(),watch:watch});
  return row;

// 把更新状态渲染到 about 页的 updRow 容器；每次 SSE 推 update 都重画一次
function redrawUpdate(row){
  if(!row)return;
  const s=window.__updState||{status:"idle",current:"加载中…"};
  row.innerHTML="";
  const cur=s.current||"未知", latest=s.latest||"";
  // 版本号 + 状态徽章
  let badge="—", badgeCls="bg-white/[0.04] text-[#9a9aa3]";
  if(s.status==="checking"){badge="检查中…";badgeCls="bg-accent/[0.12] text-accent";}
  else if(s.status==="up-to-date"){badge="已是最新";badgeCls="bg-sage/[0.14] text-sage";}
  else if(s.status==="available"){badge="新版可用："+latest;badgeCls="bg-sand/[0.16] text-sand";}
  else if(s.status==="downloading"){badge="下载中 "+(s.progress||0)+"%";badgeCls="bg-accent/[0.14] text-accent";}
  else if(s.status==="ready"){badge="已就绪："+latest+" · 重启应用";badgeCls="bg-sage/[0.18] text-sage";}
  else if(s.status==="error"){badge="错误："+(s.message||"");badgeCls="bg-rose/[0.16] text-rose";}
  const verCtl=h("div",{class:"flex items-center gap-2 flex-wrap"},
    h("span",{class:"text-[13px] text-[#d4d4da] font-mono",text:cur}),
    h("span",{class:"text-[11px] px-2 py-[2px] rounded-[6px] "+badgeCls,text:badge}));
  // 操作按钮根据状态切换
  const actions=h("div",{class:"flex items-center gap-2 mt-2 flex-wrap"});
  const checkBtn=sBtn("立即检查",false,async()=>{
    try{await fetch("/api/update/check",{method:"POST"});}catch(e){}
  });
  actions.append(checkBtn);
  // 独立「重启」：退出当前 App 再自动拉起（不依赖更新）
  actions.append(sBtn("重启",false,async()=>{
    if(!confirm("确认现在重启应用？\n（未保存的对话仍会保留在文件里。）"))return;
    try{await fetch("/api/restart",{method:"POST"});}catch(e){}
  }));
  if(s.status==="available"){
    actions.append(sBtn("下载更新",true,async()=>{
      try{await fetch("/api/update/download",{method:"POST"});}catch(e){}
    }));
  }
  if(s.status==="ready"){
    actions.append(sBtn("重启应用",true,async()=>{
      if(!confirm("确认现在重启应用以应用更新？\n（未保存的对话仍会保留在文件里。）"))return;
      try{await fetch("/api/update/apply",{method:"POST"});}catch(e){}
    }));
  }
  // 优先指向「当前运行版本」的 tag 页面；没有（dev 构建）才回退到 latest release
  const ghUrl=s.currentUrl||s.url;
  if(ghUrl){
    actions.append(h("a",{href:ghUrl,target:"_blank",
      class:"text-[11.5px] text-[#74747e] hover:text-accent transition self-center ml-2",
      text:"在 GitHub 查看 ↗"}));
  }
  row.append(sField("版本","当前已运行的版本；每 30 分钟自动检查更新。",
    h("div",{},verCtl,actions)));
}
// 全局 SSE update 事件 → 缓存最新状态 + 触发 about 页重绘 + 顶栏角标刷新
window.__updState=null;
function applyUpdateState(s){
  window.__updState=s;
  // 关于页可能正在显示，重画其更新区
  const set=$("#settings");
  if(set&&!set.classList.contains("hidden")){
    const setBody=$("#setBody");
    if(setBody){
      const first=setBody.querySelector(":scope > div"); // updRow 是第一个 child
      if(first&&first.querySelector(".sflabel")?.textContent==="版本")
        redrawUpdate(first);
    }
  }
  drawUpdateBadge();
}
// 顶栏角标：available/ready 时显示
function drawUpdateBadge(){
  let el=document.getElementById("updateBadge");
  const s=window.__updState||{};
  const show=s.status==="available"||s.status==="ready"||s.status==="downloading";
  if(!show){el&&el.remove();return;}
  if(!el){
    el=document.createElement("button");
    el.id="updateBadge";
    el.title="点击查看更新";
    el.style.cssText="position:absolute;top:14px;right:14px;z-index:50;"+
      "padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:500;"+
      "background:rgba(214,184,120,.18);color:#d6b878;cursor:pointer;"+
      "border:1px solid rgba(214,184,120,.35);backdrop-filter:blur(6px);"+
      "transition:background .15s";
    el.onmouseenter=()=>el.style.background="rgba(214,184,120,.28)";
    el.onmouseleave=()=>el.style.background="rgba(214,184,120,.18)";
    el.onclick=()=>{
      // 打开设置 → 关于
      $("#openSet")?.click();
      // 略等一帧再切到 about tab
      setTimeout(()=>{
        const nav=[...document.querySelectorAll("#setNav .snav")]
          .find(n=>n.textContent.includes("关于"));
        nav&&nav.click();
      },100);
    };
    document.body.append(el);
  }
  if(s.status==="downloading")el.textContent="● 下载中 "+(s.progress||0)+"%";
  else if(s.status==="ready")el.textContent="● 新版已就绪 · 重启应用";
  else el.textContent="● 新版可用："+(s.latest||"");
}

// classic script 里 `function openSession` 同名挂全局，被 window.openSession 覆盖后
// 内部 `openSession(id)` 在 WebKit/JSC 下会走全局对象 → 自身递归 → RangeError。
// 把原函数引用先存到局部 const，proxy 通过局部引用调用。
const _openSessionImpl=openSession;

  if(!id)return;

  requestAnimationFrame(()=>{

    if(el)el.scrollIntoView({block:"center"});

  if(c.claude.resumeCmd&&!c.claude.resumeCmd.includes("{sid}"))
    return "Claude 续聊模版必须包含 {sid}";
  if(c.issue.detailCmd&&!c.issue.detailCmd.includes("{number}"))
    return "「详情」模版必须包含 {number}";
  return "";

document.addEventListener("keydown",e=>{
  const tag=(e.target.tagName||"").toLowerCase();
  const typing=tag==="input"||tag==="textarea"||tag==="select";
  if(e.key==="Escape"){
    closeCtxMenu();
    if(document.activeElement===$("#q")&&$("#q").value){
      $("#q").value="";scheduleList();$("#q").blur();
    }
    if(!$("#settings").classList.contains("hidden"))closeSettings();
    return;
