  if(typing)return;
  if(e.key==="/"){ // 聚焦搜索框
    e.preventDefault();setView("list");$("#q").focus();return;
  }
  if((e.key==="ArrowDown"||e.key==="ArrowUp")&&sidebarView==="list"&&listRows.length){
    e.preventDefault();
    const down=e.key==="ArrowDown";
    // 把 listRows 展开成可选中的会话扁平序列（父项 + 展开态下的子项），跳过 divider
    const flat=[],rowIdx=[];
    listRows.forEach((r,ri)=>{
      if(r.kind==="divider")return;
      if(r.kind==="item"){flat.push(r.s);rowIdx.push(ri);return;}
      flat.push(r.parent);rowIdx.push(ri);
      if(subExpanded.has(r.parent.sid))
        r.children.forEach(c=>{flat.push(c);rowIdx.push(ri);});
    });
    if(!flat.length)return;
    let i=flat.findIndex(s=>s.id===currentId);
    i=(i<0?(down?-1:0):i)+(down?1:-1);
    i=Math.max(0,Math.min(flat.length-1,i));
    const s=flat[i];if(!s)return;
    while(listShown<=rowIdx[i]&&listShown<listRows.length)listChunk();
    openSession(s.id);
    const el=document.querySelector('#list .item[data-id="'+s.id+'"]');
    if(el)el.scrollIntoView({block:"nearest"});
  }
});

/* ── 启动 ── */
// 深链解析：?type=codex|claude&session=<sid> → 在已加载会话中找匹配项
// 找不到时返回 null（调用方决定要不要拉全量重试）
function findBySidType(type,sid){
  if(!type||!sid)return null;
  let best=null;
  for(const s of sessions.values()){
    if(s.source!==type||s.sid!==sid)continue;
    // 同 sid 多匹配（worktree 共用 sid）：取 mtime 最大的
    if(!best||(s.mtime||0)>(best.mtime||0))best=s;
  }
  return best;
}
async function boot(){
  // app 模式：启用 macOS 窗口布局（标题栏拖拽区 + 系统红绿灯安全区）
  const qs=new URLSearchParams(location.search);
  if(qs.get("app"))document.body.classList.add("app");
  const deepType=qs.get("type"), deepSid=qs.get("session");
  if(deepType||deepSid){
    // 消费完即从 URL 移除，避免刷新/分享时被反复触发
    qs.delete("type");qs.delete("session");
    const s=qs.toString();
    history.replaceState(null,"",location.pathname+(s?"?"+s:"")+location.hash);
  }
  try{
    // 深链场景：直接拉全量（老会话点链接打不开会迷茫），并把日期过滤切到"全部"
    const range=(deepType&&deepSid)?"all":"today";
    if(range==="all"){
      dateFilter="all";loadedRange="all";
      document.querySelectorAll(".dpill[data-range]").forEach(x=>
        x.classList.toggle("on",x.dataset.range==="all"));
    }
    const d=await(await fetch("/api/sessions?range="+range)).json();
    $("#rootPath").textContent=(d.sources||[]).join(" · ")+" 实时监控";
    (d.sessions||[]).forEach(s=>sessions.set(s.id,s));
    (d.pins||[]).forEach(id=>pinned.add(id));
    renderList();
    // 优先级：深链匹配 > 今天最新 > 任意最新
    let target=findBySidType(deepType,deepSid);
    if(!target){
      const sorted=[...sessions.values()].sort((a,b)=>ctime(b)-ctime(a));
      target=sorted.find(s=>inRange(s.mtime))||sorted[0];
      if(deepType&&deepSid)
        $("#rootPath").textContent="未找到分享的会话（可能已被删除或归档）";
    }
    if(target)openSession(target.id);
  }catch(e){$("#rootPath").textContent="加载失败";}
  // 初始化"后端运行中"状态（SSE 重连后由服务端事件持续维护）
  try{
    const d=await(await fetch("/api/run/list")).json();
    (d.procs||[]).forEach(p=>running.set(p.sid,
      {pid:p.pid,agent:p.agent,cwd:p.cwd,prompt:p.prompt,startedAt:p.startedAt}));
    if(curSummary)drawHeader();
  }catch(_){}
  connectStream();
}
/* ── 新任务启动器 & 分享链接 —— 包 try/catch 防止解析期错误打断 boot ── */
try{(function(){
  const M=$("#runModal");
  if(!M)return; // 缺元素静默退出
  let agent="claude", cwd="", recent=[];

  function open(){
    M.classList.remove("hidden");
    $("#runStatus").textContent="";
    fetch("/api/fs/home",{credentials:"same-origin"}).then(r=>r.json()).then(d=>{
      recent=d.recent||[];renderRecent(d.shortcuts||[]);
      if(!cwd)loadDir(d.home); else loadDir(cwd);
    }).catch(()=>{if(cwd)loadDir(cwd);});
    setTimeout(()=>$("#runPrompt").focus(),50);
  }
  function close(){ M.classList.add("hidden"); }

  function renderRecent(shortcuts){
    const el=$("#runRecent");el.innerHTML="";
    const seen=new Set(),list=[];
    for(const p of recent.concat(shortcuts)){
      if(p&&!seen.has(p)){seen.add(p);list.push(p);}
      if(list.length>=10)break;
    }
    for(const p of list){
      const b=h("button",{class:"rrecent",title:p,text:shortPath(p)});
      b.onclick=()=>{$("#runCwd").value=p;loadDir(p);};
      el.append(b);
    }
  }
  function shortPath(p){
    const home=recent[0]&&recent[0].startsWith("/Users/")?recent[0].split("/").slice(0,3).join("/"):"";
    let s=p;if(home&&s.startsWith(home))s="~"+s.slice(home.length);
    const parts=s.split("/").filter(Boolean);
    return parts.length<=2?s:".../"+parts.slice(-2).join("/");
  }

  function loadDir(p){
    $("#runCwd").value=p;cwd=p;
    fetch("/api/fs/ls?path="+encodeURIComponent(p),{credentials:"same-origin"})
      .then(r=>r.json()).then(d=>{
        if(!d.ok){$("#runDirList").innerHTML="<div class='px-3 py-2 text-[12px] text-rose'>"+esc(d.error||"加载失败")+"</div>";return;}
        renderCrumbs(d.path,d.parent);
        const list=$("#runDirList");list.innerHTML="";
        if(d.parent){
          const up=h("div",{class:"rdir"},h("span",{class:"ic",text:"↑"}),h("span",{text:"..（上一级）"}));
          up.onclick=()=>loadDir(d.parent);list.append(up);
        }
        for(const e of d.dirs){
          const row=h("div",{class:"rdir"},h("span",{class:"ic",text:"▸"}),h("span",{text:e.name}));
          row.onclick=()=>loadDir(e.path);list.append(row);
        }
        if(d.dirs.length===0){
          list.append(h("div",{class:"px-3 py-2 text-[11px] text-[#62626b]",
            text:"（此目录下无子目录；点上方面包屑切换或直接在输入框输入路径）"}));
        }
      });
  }
  function renderCrumbs(path,parent){
    const el=$("#runCrumbs");el.innerHTML="";
    const parts=path.split("/").filter(Boolean);
    const root=h("span",{class:"rcrumb",text:"/"});root.onclick=()=>loadDir("/");el.append(root);
    let acc="";
    for(let i=0;i<parts.length;i++){
      acc+="/"+parts[i];
      if(i)el.append(h("span",{class:"text-[#3a3a42]",text:"/"}));
      const cur=acc;
      const c=h("span",{class:"rcrumb",text:parts[i]});c.onclick=()=>loadDir(cur);el.append(c);
    }
  }

  async function run(){
    const prompt=$("#runPrompt").value.trim();
    const useCwd=$("#runCwd").value.trim()||cwd;
    if(!prompt){$("#runStatus").textContent="✗ prompt 不能为空";return;}
    if(!useCwd){$("#runStatus").textContent="✗ 请选择工作目录";return;}
    // 兜底再确认一次 agent 与 .on 视觉态一致
    const onBtn=document.querySelector("#runAgent .ragent.on");
    if(onBtn&&onBtn.dataset.agent)agent=onBtn.dataset.agent;
    $("#runStatus").textContent="启动 "+agent+" 中…";
    $("#runGo").disabled=true;
    try{
      const d=await(await fetch("/api/run",{method:"POST",
        headers:{"Content-Type":"application/json"},credentials:"same-origin",
        body:JSON.stringify({agent:agent,mode:"new",cwd:useCwd,prompt:prompt})})).json();
      if(d.ok){
        $("#runStatus").textContent="✓ "+agent+" 已启动 (pid "+d.pid+")，新会话即将出现在列表";
        $("#runPrompt").value="";
        setTimeout(close,1200);
      }else{
        $("#runStatus").textContent="✗ "+(d.error||"启动失败");
      }
    }catch(e){$("#runStatus").textContent="✗ "+(e.message||"启动失败");}
    $("#runGo").disabled=false;
  }

  // agent 切换：直接给每个 .ragent 绑事件，不挂 document（避免任何全局副作用）
  for(const b of M.querySelectorAll("#runAgent .ragent")){
    b.addEventListener("click",()=>{
      agent=b.dataset.agent;
      for(const x of M.querySelectorAll("#runAgent .ragent"))
        x.classList.toggle("on",x===b);
    });
  }
  const nb=$("#newTaskBtn"); if(nb)nb.addEventListener("click",open);
  $("#runClose").addEventListener("click",close);
  $("#runCancel").addEventListener("click",close);
  $("#runGo").addEventListener("click",run);
  M.addEventListener("click",e=>{if(e.target===M)close();});
  $("#runCwd").addEventListener("change",e=>{const v=e.target.value.trim();if(v)loadDir(v);});
  $("#runPrompt").addEventListener("keydown",e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){e.preventDefault();run();}
  });
  document.addEventListener("keydown",e=>{
    if(e.key==="Escape"&&!M.classList.contains("hidden"))close();
  });
})();}catch(e){console.error("[runModal init]",e);}

try{(function(){
  const M=$("#shareModal");
  if(!M)return;
  // sess 为可选会话上下文：传入则生成"打开即定位"的深链
  async function open(sess){
    M.classList.remove("hidden");
    // 改写 modal 头部以区分两种分享场景
    const titleEl=$("#shareTitle"), subEl=$("#shareSub");
    if(sess&&sess.sid){
      if(titleEl)titleEl.textContent="⇪ 分享会话";
      if(subEl)subEl.textContent=trunc(oneline(sess.title||"(无标题会话)"),48);
    }else{
      if(titleEl)titleEl.textContent="⇪ 分享链接";
      if(subEl)subEl.textContent="同一 Wi-Fi 打开即可使用";
    }
    const list=$("#shareList");list.innerHTML="<div class='text-[12px] text-[#62626b] px-1'>加载中…</div>";
    try{
      const d=await(await fetch("/api/lan-url",{credentials:"same-origin"})).json();
      list.innerHTML="";
      const urls=(d.urls||[]).slice();
      const local="http://127.0.0.1:"+(d.port||location.port||"")+"/?t="+(d.token||"");
      urls.unshift(local);
      // 深链 query 拼接：?t=...&type=<source>&session=<sid>
      const decorate=u=>{
        if(!sess||!sess.sid)return u;
        const sep=u.includes("?")?"&":"?";
        return u+sep+"type="+encodeURIComponent(sess.source||"")
                 +"&session="+encodeURIComponent(sess.sid);
      };
      for(const u of urls){
        const link=decorate(u);
        const row=h("div",{class:"shareRow"},
          h("span",{class:"url",text:link}),
          h("button",{class:"cpy",text:"复制"}));
        row.querySelector(".cpy").onclick=()=>{
          navigator.clipboard.writeText(link).then(
            ()=>{row.querySelector(".cpy").textContent="✓ 已复制";
                 setTimeout(()=>row.querySelector(".cpy").textContent="复制",1500);},
            ()=>{row.querySelector(".cpy").textContent="✗ 失败";}
          );
        };
        list.append(row);
      }
      if(urls.length===1)list.append(h("div",{class:"text-[11px] text-[#62626b] px-1 pt-1",
        text:"未检测到 LAN IPv4 地址；可能未连 Wi-Fi 或网卡未启用"}));
    }catch(e){
      list.innerHTML="<div class='text-[12px] text-rose px-1'>加载失败："+esc(e.message||"")+"</div>";
    }
  }
  function close(){M.classList.add("hidden");}
  window.openShareModal=open; // 暴露给右键/长按菜单使用
  const sb=$("#shareBtn"); if(sb)sb.addEventListener("click",()=>open());
  $("#shareClose").addEventListener("click",close);
  M.addEventListener("click",e=>{if(e.target===M)close();});
  document.addEventListener("keydown",e=>{
    if(e.key==="Escape"&&!M.classList.contains("hidden"))close();
  });
})();}catch(e){console.error("[shareModal init]",e);}

boot();
</script>
